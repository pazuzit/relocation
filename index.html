  const[sel,setSel]=useState(METRIC_DEFS[0].key);
  const m=METRIC_DEFS.find(x=>x.key===sel);
  const dotC=TYPE_DOT_COLOR[m?.type]||"var(--muted)";

  return e("div",{className:"metric-list-wrap"},
    e("div",{className:"metric-list-inner"},
      CATS.map(cat=>e("div",{key:cat},
        e("div",{className:"ml-cat"},cat),
        METRIC_DEFS.filter(x=>x.cat===cat).map(x=>e("div",{
          key:x.key,
          className:"ml-item"+(sel===x.key?" active":""),
          onClick:()=>setSel(x.key)
        },
          e("div",{style:{width:5,height:5,borderRadius:"50%",background:TYPE_DOT_COLOR[x.type],flexShrink:0}}),
          x.label
        ))
      ))
    ),
    m&&e("div",{className:"metric-detail-inner"},
      e("div",{style:{display:"flex",alignItems:"flex-start",gap:12,marginBottom:12}},
        e("div",{style:{flex:1}},
          e("h2",{style:{marginBottom:6}},m.label),
          e("div",{style:{fontFamily:"DM Mono,monospace",fontSize:".65rem",color:"var(--muted)",marginBottom:6}},m.source)
        ),
        e("div",{style:{background:dotC+"20",border:"1px solid "+dotC+"44",color:dotC,borderRadius:20,padding:"3px 10px",fontFamily:"DM Mono,monospace",fontSize:".56rem",whiteSpace:"nowrap",letterSpacing:".07em"}},TYPE_LABEL[m.type])
      ),
      e("div",{className:"logic-box"},
        e("div",{className:"box-label"},"💡 Why this formula?"),
        e("p",null,m.logic)
      ),
      e("div",{className:"formula-box"},
        e("div",{className:"box-label",style:{color:"var(--muted)"}},"Formula"),
        e("pre",null,m.formula)
      ),
      ranked.length>0&&e("table",{className:"metric-score-table",style:{marginTop:8}},
        e("thead",null,e("tr",null,e("th",null,"City"),e("th",null,"Raw value"),e("th",null,"Score"))),
        e("tbody",null,ranked.map(r=>{
          const data=allScoresMap[r.name]||{};
          const v=data.scores?.[m.key]??0;
          const raw=data.raws?.[m.key]||"—";
          const db=CITY_DB.find(c=>c.city===r.name);
          const cls=v>=7.5?"hi":v<3.5?"lo":"";
          return e("tr",{key:r.name},
            e("td",null,e("span",{style:{marginRight:6}},db?.flag||""),"",r.name),
            e("td",{style:{fontFamily:"DM Mono,monospace",fontSize:".67rem",color:"var(--muted)"}},raw),
            e("td",null,e("div",{className:"score-bar-wrap"},
              e("div",{className:"score-bar-bg"},e("div",{className:"score-bar-fill",style:{width:(v*10)+"%"}})),
              e("div",{className:"score-num "+cls},v.toFixed(1))
            ))
          );
        }))
      )
    )
  );
}

// ── Explanations panel ───────────────────────────────────────
function ExplanationsPanel({ranked,allScoresMap,weights,setup}){
  const winner=ranked[0];
  const CITY_COLORS=["var(--accent)","var(--blue)","var(--purple)","var(--green)","var(--orange)","var(--red)"];
  if(!winner)return e("div",{className:"onboard-empty"},e("div",{className:"big"},"💡"),"Add cities first");

  // Build per-city narrative
  const cityNarrative=(r,rank)=>{
    const s=allScoresMap[r.name]?.scores||{};
    const db=CITY_DB.find(c=>c.city===r.name)||{};
    const strengths=METRIC_DEFS
      .filter(m=>(weights[m.key]||0)>0&&(s[m.key]||0)>=7.5)
      .sort((a,b)=>(s[b.key]||0)*(weights[b.key]||0)-(s[a.key]||0)*(weights[a.key]||0))
      .slice(0,4);
    const weaknesses=METRIC_DEFS
      .filter(m=>(weights[m.key]||0)>0&&(s[m.key]||0)<3.5)
      .sort((a,b)=>(s[a.key]||0)*(weights[a.key]||0)-(s[b.key]||0)*(weights[b.key]||0))
      .slice(0,3);
    const color=CITY_COLORS[rank-1]||"var(--muted)";
    return e("div",{key:r.name,style:{marginBottom:16,background:"var(--surf)",border:"1px solid var(--border)",borderLeft:"3px solid "+color,borderRadius:"var(--r2)",padding:16}},
      e("div",{style:{display:"flex",alignItems:"baseline",gap:10,marginBottom:10}},
        e("span",{style:{fontFamily:"DM Mono,monospace",fontSize:".65rem",color,width:22}},"#"+rank),
        e("span",{style:{fontSize:18}},db.flag||"🏙️"),
        e("span",{style:{fontWeight:700,fontSize:"1rem",flex:1}},r.name),
        e("span",{style:{fontFamily:"DM Mono,monospace",fontSize:".9rem",color}},r.total.toFixed(1)+"/100")
      ),
      strengths.length>0&&e("div",{style:{marginBottom:8}},
        e("div",{style:{fontFamily:"DM Mono,monospace",fontSize:".57rem",color:"var(--green)",letterSpacing:".08em",textTransform:"uppercase",marginBottom:5}},"✓ Strengths"),
        e("div",{style:{display:"flex",flexWrap:"wrap",gap:5}},
          strengths.map(m=>e("span",{key:m.key,style:{fontFamily:"DM Mono,monospace",fontSize:".65rem",padding:"2px 8px",borderRadius:20,background:"rgba(77,255,145,.1)",border:"1px solid rgba(77,255,145,.2)",color:"var(--green)"}},m.label+" ",(s[m.key]||0).toFixed(1)))
        )
      ),
      weaknesses.length>0&&e("div",null,
        e("div",{style:{fontFamily:"DM Mono,monospace",fontSize:".57rem",color:"var(--red)",letterSpacing:".08em",textTransform:"uppercase",marginBottom:5}},"✗ Challenges"),
        e("div",{style:{display:"flex",flexWrap:"wrap",gap:5}},
          weaknesses.map(m=>e("span",{key:m.key,style:{fontFamily:"DM Mono,monospace",fontSize:".65rem",padding:"2px 8px",borderRadius:20,background:"rgba(255,107,107,.1)",border:"1px solid rgba(255,107,107,.2)",color:"var(--red)"}},m.label+" ",(s[m.key]||0).toFixed(1)))
        )
      ),
      strengths.length===0&&weaknesses.length===0&&e("div",{style:{fontFamily:"DM Mono,monospace",fontSize:".68rem",color:"var(--muted)"}},"No metrics with weight > 0 scoring at extremes.")
    );
  };

  return e("div",null,
    // How scoring works
    e("div",{style:{background:"var(--surf)",border:"1px solid var(--border)",borderRadius:"var(--r2)",padding:16,marginBottom:16}},
      e("h3",{style:{marginBottom:8}},"How the scoring works"),
      e("div",{style:{fontFamily:"DM Mono,monospace",fontSize:".72rem",color:"var(--dim)",lineHeight:1.7}},
        "Each city is scored on 17 metrics grouped into 8 categories. Every metric is normalized to 0–10 using real data sources (Open-Meteo, Numbeo, EF EPI, etc.). Your priority weights (set in Step 2) multiply each score — a metric you set to 0 is ignored entirely, one set to 10 has maximum influence.",
        e("br",null),e("br",null),
        "Final score = (Σ metric_score × weight) / (Σ 10 × weight) × 100. A score of 80 means the city scored 80% of the maximum possible given your weights.",
        e("br",null),e("br",null),
        "Dynamic metrics (visa, family proximity, language) are re-computed live whenever your setup changes. Live API metrics (weather, air quality, Numbeo) are fetched on demand and cached in your browser."
      )
    ),
    // Per-city narratives
    e("div",{style:{fontFamily:"DM Mono,monospace",fontSize:".6rem",color:"var(--muted)",letterSpacing:".08em",textTransform:"uppercase",marginBottom:10}},"Per-city analysis"),
    ranked.map((r,i)=>cityNarrative(r,i+1))
  );
}

// ── Sensitivity panel ─────────────────────────────────────────
function SensitivityPanel({ranked,allScoresMap,weights}){
  const[hoverKey,setHoverKey]=useState(null);
  const CITY_COLORS=["var(--accent)","var(--blue)","var(--purple)","var(--green)","var(--orange)","var(--red)"];
  if(ranked.length<2)return e("div",{className:"onboard-empty"},e("div",{className:"big"},"📐"),"Add at least 2 cities first");

  // For each metric with weight > 0, compute what happens if we max it (weight=10) vs zero it
  const activeMetrics=METRIC_DEFS.filter(m=>(weights[m.key]||0)>0);

  const scenarioRanking=(overrideWeights)=>{
    const w={...weights,...overrideWeights};
    return ranked
      .map(r=>({name:r.name,total:scoreCityTotal(allScoresMap[r.name]?.scores||{},w)}))
      .sort((a,b)=>b.total-a.total);
  };

  const baseWinner=ranked[0]?.name;

  const scenarios=activeMetrics.map(m=>{
    const maxRanking=scenarioRanking({[m.key]:10});
    const zeroRanking=scenarioRanking({[m.key]:0});
    const maxWinner=maxRanking[0]?.name;
    const zeroWinner=zeroRanking[0]?.name;
    const changesMax=maxWinner!==baseWinner;
    const changesZero=zeroWinner!==baseWinner;
    return{metric:m,maxRanking,zeroRanking,maxWinner,zeroWinner,changesMax,changesZero};
  }).filter(s=>s.changesMax||s.changesZero);

  const noChange=activeMetrics.filter(m=>{
    const maxW=scenarioRanking({[m.key]:10})[0]?.name;
    const zeroW=scenarioRanking({[m.key]:0})[0]?.name;
    return maxW===baseWinner&&zeroW===baseWinner;
  });

  return e("div",null,
    // Intro
    e("div",{style:{background:"var(--surf)",border:"1px solid var(--border)",borderRadius:"var(--r2)",padding:14,marginBottom:16}},
      e("div",{style:{fontFamily:"DM Mono,monospace",fontSize:".72rem",color:"var(--dim)",lineHeight:1.65}},
        "Sensitivity analysis asks: ",e("em",{style:{color:"var(--accent)"}},"\"what would flip the #1 result?\""),
        " For each metric, we test what happens to the ranking if you max it (weight=10) or remove it (weight=0). Scenarios that don't change the winner are stable; ones that do are shown below."
      )
    ),
    // Current winner
    e("div",{style:{background:"rgba(232,255,71,.07)",border:"1px solid rgba(232,255,71,.25)",borderRadius:"var(--r)",padding:"10px 14px",marginBottom:14,fontFamily:"DM Mono,monospace",fontSize:".72rem"}},
      "Current #1: ",e("strong",{style:{color:"var(--accent)"}},CITY_DB.find(c=>c.city===baseWinner)?.flag||"🏙️"," ",baseWinner),
      " — shown below are metrics that would change this outcome if you weighted them differently."
    ),

    scenarios.length===0&&e("div",{style:{fontFamily:"DM Mono,monospace",fontSize:".75rem",color:"var(--green)",padding:"14px 0",textAlign:"center"}},
      "✓ The current #1 ranking is robust — no single metric change flips it."
    ),

    scenarios.map(s=>e("div",{
      key:s.metric.key,
      style:{background:"var(--surf)",border:"1px solid "+(hoverKey===s.metric.key?"var(--border)":"var(--border)"),borderRadius:"var(--r)",padding:"12px 14px",marginBottom:8,transition:"border-color .15s"},
      onMouseEnter:()=>setHoverKey(s.metric.key),
      onMouseLeave:()=>setHoverKey(null),
    },
      e("div",{style:{display:"flex",alignItems:"center",gap:8,marginBottom:8}},
        e("div",{style:{flex:1,fontWeight:600,fontSize:".82rem"}},s.metric.label),
        e("span",{style:{fontFamily:"DM Mono,monospace",fontSize:".6rem",color:"var(--orange)",background:"rgba(255,179,71,.1)",border:"1px solid rgba(255,179,71,.25)",borderRadius:20,padding:"2px 8px"}},"current weight: "+weights[s.metric.key])
      ),
      e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}},
        // Max scenario
        e("div",{style:{background:"var(--surf2)",borderRadius:4,padding:"8px 10px"}},
          e("div",{style:{fontFamily:"DM Mono,monospace",fontSize:".57rem",color:"var(--muted)",textTransform:"uppercase",letterSpacing:".07em",marginBottom:5}},"If weight = 10 (max)"),
          s.maxRanking.slice(0,3).map((r,i)=>e("div",{key:r.name,style:{display:"flex",alignItems:"center",gap:6,marginBottom:3}},
            e("span",{style:{fontFamily:"DM Mono,monospace",fontSize:".6rem",color:i===0?CITY_COLORS[ranked.findIndex(x=>x.name===r.name)]:"var(--muted)",width:16}},"#"+(i+1)),
            e("span",{style:{fontSize:12}},CITY_DB.find(c=>c.city===r.name)?.flag||""),
            e("span",{style:{fontSize:".75rem",fontWeight:i===0?700:400,color:i===0&&s.changesMax?"var(--accent)":"var(--text)"}},r.name),
            i===0&&s.changesMax&&e("span",{style:{fontFamily:"DM Mono,monospace",fontSize:".55rem",color:"var(--accent)",marginLeft:4}},"← NEW #1")
          ))
        ),
        // Zero scenario
        e("div",{style:{background:"var(--surf2)",borderRadius:4,padding:"8px 10px"}},
          e("div",{style:{fontFamily:"DM Mono,monospace",fontSize:".57rem",color:"var(--muted)",textTransform:"uppercase",letterSpacing:".07em",marginBottom:5}},"If weight = 0 (ignored)"),
          s.zeroRanking.slice(0,3).map((r,i)=>e("div",{key:r.name,style:{display:"flex",alignItems:"center",gap:6,marginBottom:3}},
            e("span",{style:{fontFamily:"DM Mono,monospace",fontSize:".6rem",color:i===0?CITY_COLORS[ranked.findIndex(x=>x.name===r.name)]:"var(--muted)",width:16}},"#"+(i+1)),
            e("span",{style:{fontSize:12}},CITY_DB.find(c=>c.city===r.name)?.flag||""),
            e("span",{style:{fontSize:".75rem",fontWeight:i===0?700:400,color:i===0&&s.changesZero?"var(--accent)":"var(--text)"}},r.name),
            i===0&&s.changesZero&&e("span",{style:{fontFamily:"DM Mono,monospace",fontSize:".55rem",color:"var(--accent)",marginLeft:4}},"← NEW #1")
          ))
        )
      )
    )),

    noChange.length>0&&e("div",{style:{marginTop:14}},
      e("div",{style:{fontFamily:"DM Mono,monospace",fontSize:".6rem",color:"var(--muted)",letterSpacing:".07em",textTransform:"uppercase",marginBottom:8}},"Stable metrics (no impact on #1)"),
      e("div",{style:{display:"flex",flexWrap:"wrap",gap:5}},
        noChange.map(m=>e("span",{key:m.key,style:{fontFamily:"DM Mono,monospace",fontSize:".63rem",padding:"2px 8px",borderRadius:20,background:"rgba(77,255,145,.07)",border:"1px solid rgba(77,255,145,.15)",color:"var(--green)"}},m.label))
      )
    )
  );
}

// ── Suggestions panel ────────────────────────────────────────
function SuggestionsPanel({setup,config,weights,liveData,onAddCity}){
  const alreadyIn=new Set(setup.cities.map(c=>c.city));

  // Score every city in the DB that's not already in the comparison
  const candidates=useMemo(()=>{
    return CITY_DB
      .filter(c=>!alreadyIn.has(c.city))
      .map(c=>{
        const {scores,raws,isLive}=buildScores(c.city,c,config,liveData);
        const total=scoreCityTotal(scores,weights);
        // Top reasons: highest (score × weight) metrics
        const reasons=METRIC_DEFS
          .filter(m=>(weights[m.key]||0)>0)
          .map(m=>({m,contribution:(scores[m.key]||0)*(weights[m.key]||0)}))
          .sort((a,b)=>b.contribution-a.contribution)
          .slice(0,3)
          .map(({m,contribution})=>({
            label:m.label,
            score:scores[m.key]||0,
            raw:raws[m.key]||null,
          }));
        // Find most similar city already in list
        let similar=null;
        if(setup.cities.length>0){
          const match=setup.cities.map(ec=>{
            const {scores:es}=buildScores(ec.city,ec,config,liveData);
            const diff=METRIC_DEFS.reduce((d,m)=>d+Math.abs((scores[m.key]||0)-(es[m.key]||0)),0);
            return{name:ec.city,diff};
          }).sort((a,b)=>a.diff-b.diff)[0];
          if(match&&match.diff<25)similar=match.name;
        }
        return{city:c,scores,raws,total,reasons,similar};
      })
      .sort((a,b)=>b.total-a.total)
      .slice(0,8);
  },[alreadyIn.size,config,weights]);

  if(setup.cities.length===0)return e("div",{className:"onboard-empty"},
    e("div",{className:"big"},"✨"),
    "Add cities in Step 1 first — suggestions are based on your priorities"
  );

  const COLORS=["var(--accent)","var(--blue)","var(--purple)","var(--green)","var(--orange)","var(--red)","var(--dim)","var(--muted)"];

  return e("div",null,
    e("div",{style:{fontFamily:"DM Mono,monospace",fontSize:".65rem",color:"var(--muted)",marginBottom:14,lineHeight:1.6}},
      "Cities not in your comparison that score highest against your current weights. Click ",
      e("strong",{style:{color:"var(--accent)"}},"+ Add"),
      " to include one."
    ),
    candidates.map((c,i)=>e("div",{
      key:c.city.city,
      style:{background:"var(--surf)",border:"1px solid var(--border)",borderLeft:"3px solid "+(COLORS[i]||"var(--muted)"),borderRadius:"var(--r2)",padding:"13px 15px",marginBottom:9}
    },
      // Header row
      e("div",{style:{display:"flex",alignItems:"center",gap:8,marginBottom:8}},
        e("span",{style:{fontSize:16,flexShrink:0}},c.city.flag),
        e("div",{style:{flex:1}},
          e("div",{style:{fontWeight:700,fontSize:".9rem"}},c.city.city),
          e("div",{style:{fontFamily:"DM Mono,monospace",fontSize:".6rem",color:"var(--muted)"}},c.city.country),
        ),
        e("div",{style:{fontFamily:"DM Mono,monospace",fontSize:".95rem",fontWeight:500,color:COLORS[i]||"var(--text)",marginRight:8}},
          c.total.toFixed(1)
        ),
        e("button",{
          style:{background:"rgba(232,255,71,.1)",border:"1px solid rgba(232,255,71,.35)",color:"var(--accent)",borderRadius:"var(--r)",padding:"5px 12px",cursor:"pointer",fontFamily:"Syne,sans-serif",fontWeight:700,fontSize:".72rem",whiteSpace:"nowrap"},
          onClick:()=>onAddCity&&onAddCity(c.city)
        },"+ Add")
      ),
      // Similarity note
      c.similar&&e("div",{style:{fontFamily:"DM Mono,monospace",fontSize:".6rem",color:"var(--blue)",marginBottom:6}},
        "⟷ Similar profile to ",c.similar," in your list"
      ),
      // Top reasons
      e("div",{style:{display:"flex",flexWrap:"wrap",gap:5}},
        c.reasons.map(r=>e("div",{
          key:r.label,
          style:{fontFamily:"DM Mono,monospace",fontSize:".62rem",padding:"2px 8px",borderRadius:20,
            background:r.score>=7.5?"rgba(77,255,145,.1)":"var(--surf2)",
            border:"1px solid "+(r.score>=7.5?"rgba(77,255,145,.25)":"var(--border)"),
            color:r.score>=7.5?"var(--green)":"var(--dim)"}
        },
          r.label," ",e("strong",null,r.score.toFixed(1)),
          r.raw&&e("span",{style:{opacity:.6,marginLeft:3}}," · ",r.raw)
        ))
      )
    ))
  );
}

// ── Step 3: Output wrapper ───────────────────────────────────
function OutputStep({ranked,allScoresMap,weights,setup,liveData,onSetupChange}){
  const[tab,setTab]=useState("summary");
  return e("div",{className:"output-layout"},
    // Left: city cards
    e("div",{className:"output-left"},
      e("div",{style:{marginBottom:14}},
        e("div",{className:"label"},"Rankings · click to expand"),
      ),
      ranked.length===0
        ?e("div",{className:"onboard-empty"},e("div",{className:"big"},"🏙️"),"Add cities in Step 1 to see results")
        :e("div",null,
          ranked.map((r,i)=>e(CityCard,{
            key:r.name,name:r.name,rank:i+1,total:r.total,
            maxTotal:ranked[0]?.total||100,
            allScores:allScoresMap[r.name]||{scores:{},raws:{},isLive:{}},
            weights,liveData:{}
          })),
          e("div",{className:"legend-row"},
            [["var(--blue)","Live API"],["var(--purple)","Calculated"],["var(--orange)","Sourced"],
             ["var(--green)","≥ 7.5"],["var(--red)","< 3.5"]].map(([c,l])=>
              e("div",{key:l,className:"legend-item"},e("div",{className:"ldot",style:{background:c}}),l)
            )
          )
        )
    ),
    // Right: tabs
    e("div",{className:"output-right"},
      e("div",{className:"output-tabs"},
        [["summary","📊 Summary"],["suggest","✨ Suggestions"],["explain","💡 Explanations"],["sensitivity","📐 Sensitivity"],["metrics","🔬 Metrics"]].map(([id,lbl])=>
          e("div",{key:id,className:"ot"+(tab===id?" active":""),onClick:()=>setTab(id)},lbl)
        )
      ),
      tab==="summary"&&(ranked.length
        ?e(SummaryPanel,{ranked,allScoresMap,weights})
        :e("div",{className:"onboard-empty"},e("div",{className:"big"},"📊"),"Add cities first")),
      tab==="suggest"&&e(SuggestionsPanel,{setup,config,weights,liveData,onAddCity:city=>{
        if(!setup.cities.find(c=>c.city===city.city)){
          const newSetup={...setup,cities:[...setup.cities,city]};
          // bubble up via prop
          if(onSetupChange)onSetupChange(newSetup);
        }
      }}),
      tab==="explain"&&e(ExplanationsPanel,{ranked,allScoresMap,weights,setup}),
      tab==="sensitivity"&&e(SensitivityPanel,{ranked,allScoresMap,weights}),
      tab==="metrics"&&e(MetricsPanel,{ranked,allScoresMap})
    )
  );
}

// ═══════════════════════════════════════════════════════════════
//  ROOT APP
// ═══════════════════════════════════════════════════════════════
function App(){
  const saved=loadState()||{};

  const[step,setStep]=useState(saved.step||0);
  const[setup,setSetup]=useState(saved.setup||{
    cities:[],passports:[],
    allAnchors:[],familyAnchors:[],proximityAnchors:[],
    languages:[],tempMin:10,tempMax:25,
    currentCity:null,currentCityInput:"",
    equityUsd:0,
    profession:"Not specified",
    hasChildren:false,
    housingLocation:"city-center",
  });
  const[weights,setWeights]=useState(saved.weights||DEFAULT_WEIGHTS);
  const[liveData,setLiveData]=useState(saved.liveData||{});
  const[pills,setPills]=useState([]);
  const[fetching,setFetching]=useState(false);

  // Save on every change
  useEffect(()=>{saveState({step,setup,weights,liveData});},[step,setup,weights,liveData]);

  const config=useMemo(()=>({
    passports:setup.passports,
    languages:setup.languages,
    familyAnchors:setup.familyAnchors,
    proximityAnchors:setup.proximityAnchors,
    equityEur:Math.round((setup.equityUsd||0)/1.08), // USD → EUR at ~1.08 rate
    equityUsd:setup.equityUsd||0,
    profession:setup.profession||"Not specified",
    hasChildren:setup.hasChildren||false,
    housingLocation:setup.housingLocation||"city-center",
  }),[setup]);

  const allScoresMap=useMemo(()=>{
    const m={};
    for(const c of setup.cities){
      m[c.city]=buildScores(c.city,c,config,liveData);
    }
    return m;
  },[setup.cities,config,liveData,weights]);

  const ranked=useMemo(()=>{
    return setup.cities
      .map(c=>{const d=allScoresMap[c.city];return{name:c.city,total:d?scoreCityTotal(d.scores,weights):0};})
      .sort((a,b)=>b.total-a.total);
  },[allScoresMap,weights]);

  const setPill=useCallback((id,label,state)=>{
    setPills(prev=>[...prev.filter(p=>p.id!==id),{id,label,state}]);
  },[]);

  const handleFetch=useCallback(async()=>{
    if(fetching)return;
    setFetching(true);
    for(const city of setup.cities){
      const db=CITY_DB.find(c=>c.city===city.city)||city;
      setPill("w_"+city.city,db.flag+" "+city.city+" weather…","busy");
      try{
        const w=await fetchWeather(db,setup.tempMin,setup.tempMax);
        setLiveData(d=>({...d,[city.city]:{...(d[city.city]||{}),...w}}));
        setPill("w_"+city.city,db.flag+" weather ✓","ok");
      }catch(e){setPill("w_"+city.city,db.flag+" weather ✗ ("+e.message.slice(0,20)+")","err");}
      setPill("a_"+city.city,db.flag+" "+city.city+" air…","busy");
      try{
        const a=await fetchAir(db);
        setLiveData(d=>({...d,[city.city]:{...(d[city.city]||{}),...a}}));
        setPill("a_"+city.city,db.flag+" air ✓","ok");
      }catch(e){setPill("a_"+city.city,db.flag+" air ✗","err");}
      setPill("n_"+city.city,db.flag+" Numbeo…","busy");
      try{
        const n=await fetchNumbeo(db);
        setLiveData(d=>({...d,[city.city]:{...(d[city.city]||{}),...n}}));
        setPill("n_"+city.city,db.flag+" Numbeo ✓","ok");
      }catch(e){setPill("n_"+city.city,db.flag+" Numbeo ✗","err");}
      await new Promise(r=>setTimeout(r,300));
    }
    setFetching(false);
  },[setup.cities,setup.tempMin,setup.tempMax,fetching,setPill]);

  const canAdvance=[
    setup.cities.length>=2,  // screen 0
    true,                     // screen 1
    (setup.allAnchors||[]).length===0||(setup.allAnchors||[]).reduce((s,a)=>s+a.weight,0)===100, // screen 2
    true,                     // screen 3
    true,                     // screen 4 (priorities)
    true,                     // screen 5 (results — always viewable)
  ];

  // Flat screens: 0-3 = setup, 4 = priorities, 5 = results
  const SCREENS=[
    {id:0, label:"Where & Who",   group:"Setup",      icon:"🏙️"},
    {id:1, label:"About You",     group:"Setup",      icon:"🧑‍💼"},
    {id:2, label:"People",        group:"Setup",      icon:"👥"},
    {id:3, label:"Preferences",   group:"Setup",      icon:"🌡️"},
    {id:4, label:"Priorities",    group:"Priorities", icon:"⚖️"},
    {id:5, label:"Results",       group:"Results",    icon:"📊"},
  ];

  // Highest screen the user has been allowed to reach
  const maxReached=useMemo(()=>{
    let m=0;
    for(let i=0;i<SCREENS.length-1;i++){
      if(canAdvance[i])m=i+1; else break;
    }
    return m;
  },[canAdvance.join(",")]);

  const goNext=useCallback(()=>{
    if(step===3){
      // Setup → Priorities: trigger fetch
      setStep(4);
      setTimeout(()=>handleFetch(),100);
    } else {
      setStep(s=>Math.min(s+1,5));
    }
  },[step,handleFetch]);

  const showFetchOverlay=step>=4&&fetching;

  return e("div",{style:{display:"flex",height:"100vh",overflow:"hidden"}},

    // ── SIDEBAR ───────────────────────────────────────────────
    e("div",{style:{
      width:210,flexShrink:0,background:"var(--surf)",borderRight:"1px solid var(--border)",
      display:"flex",flexDirection:"column",height:"100vh",
    }},
      // Logo
      e("div",{style:{padding:"22px 20px 18px",borderBottom:"1px solid var(--border)"}},
        e("div",{style:{fontWeight:800,fontSize:"1.05rem",letterSpacing:"-.02em",lineHeight:1.2}},
          "Where should",e("br",null),"you ",e("span",{style:{color:"var(--accent)"}},"move?")
        ),
        e("div",{style:{fontFamily:"DM Mono,monospace",fontSize:".56rem",color:"var(--muted)",marginTop:5}},
          CITY_DB.length+" cities · "+METRIC_DEFS.length+" metrics"
        )
      ),
      // Nav items
      e("div",{style:{flex:1,overflowY:"auto",padding:"10px 0"}},
        // Group headers + items
        [["Setup",[0,1,2,3]],["Priorities",[4]],["Results",[5]]].map(([group,ids])=>
          e("div",{key:group,style:{marginBottom:4}},
            e("div",{style:{fontFamily:"DM Mono,monospace",fontSize:".55rem",letterSpacing:".1em",textTransform:"uppercase",color:"var(--muted)",padding:"6px 20px 4px"}},group),
            ids.map(id=>{
              const s=SCREENS[id];
              const isActive=step===id;
              const isDone=step>id;
              const isLocked=id>maxReached+1;
              return e("div",{
                key:id,
                onClick:()=>{ if(!isLocked&&id<=maxReached+1) setStep(id); },
                style:{
                  display:"flex",alignItems:"center",gap:10,padding:"9px 20px",
                  cursor:isLocked?"not-allowed":"pointer",
                  background:isActive?"rgba(232,255,71,.08)":"transparent",
                  borderLeft:"2px solid "+(isActive?"var(--accent)":isDone?"rgba(77,255,145,.4)":"transparent"),
                  transition:"background .15s",
                  opacity:isLocked?.35:1,
                }
              },
                e("div",{style:{
                  width:20,height:20,borderRadius:"50%",flexShrink:0,
                  display:"flex",alignItems:"center",justifyContent:"center",
                  fontSize:isDone?".65rem":".7rem",fontWeight:700,
                  background:isDone?"var(--green)":isActive?"var(--accent)":"var(--border)",
                  color:isDone||isActive?"var(--bg)":"var(--muted)",
                }},isDone?"✓":s.icon),
                e("div",{style:{fontSize:".78rem",fontWeight:isActive?700:400,color:isActive?"var(--accent)":isDone?"var(--green)":"var(--dim)"}},s.label)
              );
            })
          )
        )
      ),
      // Bottom: summary tags + reset
      e("div",{style:{padding:"14px 16px",borderTop:"1px solid var(--border)",display:"flex",flexDirection:"column",gap:6}},
        setup.currentCity&&e("div",{style:{fontFamily:"DM Mono,monospace",fontSize:".6rem",color:"var(--muted)"}},
          "📍 ",setup.currentCity.flag," ",setup.currentCity.city
        ),
        setup.passports.length>0&&e("div",{style:{fontFamily:"DM Mono,monospace",fontSize:".6rem",color:"var(--muted)"}},
          "🛂 ",setup.passports.join(" · ")
        ),
        setup.cities.length>0&&e("div",{style:{fontFamily:"DM Mono,monospace",fontSize:".6rem",color:"var(--accent)"}},
          setup.cities.length," cit"+(setup.cities.length>1?"ies":"y")+" selected"
        ),
        e("button",{
          style:{marginTop:4,background:"transparent",border:"1px solid var(--border)",color:"var(--muted)",borderRadius:"var(--r)",padding:"5px 10px",cursor:"pointer",fontFamily:"DM Mono,monospace",fontSize:".6rem",textAlign:"left"},
          onClick:()=>{if(window.confirm("Reset everything?")){{localStorage.removeItem(LS_KEY);location.reload();}}}
        },"↺ Reset everything")
      )
    ),

    // ── MAIN CONTENT ─────────────────────────────────────────
    e("div",{style:{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}},

      // Loading overlay
      showFetchOverlay&&e("div",{style:{
        position:"absolute",inset:0,background:"rgba(12,12,16,.94)",zIndex:1000,
        display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:14,
      }},
        e("div",{style:{fontSize:"2.5rem",animation:"spin 1.2s linear infinite"}},"⚡"),
        e("div",{style:{fontFamily:"Syne,sans-serif",fontWeight:700,fontSize:"1.15rem",color:"var(--accent)"}},"Fetching live data…"),
        e("div",{style:{fontFamily:"DM Mono,monospace",fontSize:".7rem",color:"var(--muted)",marginBottom:6}},"Weather · Air quality · Rent · Safety · Healthcare"),
        e("div",{style:{display:"flex",gap:5,flexWrap:"wrap",justifyContent:"center",maxWidth:460}},
          pills.map(p=>e("div",{key:p.id,className:"pill pill-"+p.state},e("div",{className:"pill-dot"+(p.state==="busy"?" blink":"")}),p.label))
        ),
        e("button",{className:"btn btn-ghost btn-sm",style:{marginTop:8},onClick:()=>setFetching(false)},"Skip & use estimates")
      ),

      // Screen content
      !showFetchOverlay&&e("div",{style:{flex:1,overflowY:"auto"}},
        step===0&&e(SetupStep,{setup,onChange:setSetup,screen:0}),
        step===1&&e(SetupStep,{setup,onChange:setSetup,screen:1}),
        step===2&&e(SetupStep,{setup,onChange:setSetup,screen:2}),
        step===3&&e(SetupStep,{setup,onChange:setSetup,screen:3}),
        step===4&&e(PrioritiesStep,{weights,onChange:setWeights,ranked}),
        step===5&&e(OutputStep,{ranked,allScoresMap,weights,setup,liveData,onSetupChange:setSetup})
      ),

      // Bottom nav bar
      !showFetchOverlay&&step<5&&e("div",{style:{
        padding:"12px 28px",borderTop:"1px solid var(--border)",
        display:"flex",alignItems:"center",justifyContent:"space-between",
        background:"var(--surf)",flexShrink:0,
      }},
        e("div",{style:{fontFamily:"DM Mono,monospace",fontSize:".63rem",color:"var(--muted)"}},
          step===0?"Add at least 2 cities to continue":
          step===1?"Fill in what applies — all fields optional":
          step===2?"Add people who matter — or skip":
          step===3?"Set preferences — defaults are fine":
          step===4?"Adjust weights, then see results →":""
        ),
        e("div",{style:{display:"flex",gap:8}},
          step>0&&e("button",{className:"btn btn-ghost btn-sm",onClick:()=>setStep(s=>s-1)},"← Back"),
          e("button",{
            className:"btn btn-primary btn-sm",
            disabled:!canAdvance[step]||fetching,
            onClick:goNext,
          },step===3?"Next — fetch live data ⚡":step===4?"See Results →":"Next →")
        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
