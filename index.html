<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relocation Scorer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b0b0f;--surf:#111118;--surf2:#181820;--border:#22222e;
  --accent:#e8ff47;--blue:#47c4ff;--purple:#b47bff;--green:#4dff91;--red:#ff6b6b;--orange:#ffb347;
  --text:#eff0f8;--dim:#a0a0c0;--muted:#55556a;
  --r:8px;--r2:12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(232,255,71,.04),transparent);}
#root{position:relative;z-index:1;min-height:100vh;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* ── Typography ── */
.mono{font-family:'DM Mono',monospace;}
.label{font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
h1{font-size:clamp(1.6rem,3.5vw,2.4rem);font-weight:800;letter-spacing:-.03em;line-height:1.1;}
h2{font-size:1.1rem;font-weight:700;letter-spacing:-.02em;}
h3{font-size:.85rem;font-weight:700;}

/* ── Layout ── */
.page{min-height:100vh;display:flex;flex-direction:column;}
.app-header{padding:20px 32px 0;border-bottom:1px solid var(--border);flex-shrink:0;}
.app-body{flex:1;overflow:hidden;}

/* ── Wizard steps ── */
.step-bar{display:flex;align-items:center;gap:0;margin-bottom:20px;}
.step-item{display:flex;align-items:center;gap:8px;padding:10px 16px;font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;}
.step-item.active{color:var(--accent);border-bottom-color:var(--accent);}
.step-item.done{color:var(--green);border-bottom-color:rgba(77,255,145,.4);}
.step-item.locked{pointer-events:none;}
.step-num{width:20px;height:20px;border-radius:50%;border:1px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:.6rem;flex-shrink:0;}
.step-item.done .step-num{background:var(--green);color:var(--bg);border-color:var(--green);}

/* ── Buttons ── */
.btn{padding:10px 20px;border-radius:var(--r);font-family:'Syne',sans-serif;font-weight:700;font-size:.8rem;cursor:pointer;border:none;transition:all .15s;display:inline-flex;align-items:center;gap:8px;}
.btn-primary{background:var(--accent);color:var(--bg);}
.btn-primary:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 20px rgba(232,255,71,.25);}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-ghost{background:transparent;color:var(--dim);border:1px solid var(--border);}
.btn-ghost:hover{border-color:var(--muted);color:var(--text);}
.btn-danger{background:rgba(255,107,107,.1);color:var(--red);border:1px solid rgba(255,107,107,.25);}
.btn-danger:hover{background:rgba(255,107,107,.2);}
.btn-sm{padding:5px 11px;font-size:.7rem;}
.btn-add{background:rgba(232,255,71,.08);color:var(--accent);border:1px solid rgba(232,255,71,.25);}
.btn-add:hover{background:rgba(232,255,71,.14);}

/* ── Inputs ── */
.input{background:var(--surf2);border:1px solid var(--border);border-radius:var(--r);padding:9px 12px;color:var(--text);font-family:'DM Mono',monospace;font-size:.78rem;outline:none;width:100%;transition:border-color .15s;}
.input:focus{border-color:rgba(232,255,71,.4);}
.input::placeholder{color:var(--muted);}
.input-group{display:flex;flex-direction:column;gap:5px;}
.input-label{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}

/* ── Autocomplete ── */
.autocomplete-wrap{position:relative;}
.ac-dropdown{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--surf2);border:1px solid var(--border);border-radius:var(--r);z-index:200;max-height:220px;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.6);overscroll-behavior:contain;}
.ac-item{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;font-size:.82rem;transition:background .1s;}
.ac-item:hover,.ac-item.selected{background:rgba(255,255,255,.06);}
.ac-flag{font-size:1.1rem;flex-shrink:0;}
.ac-main{flex:1;}
.ac-city{font-weight:600;}
.ac-country{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--muted);margin-top:1px;}
.ac-empty{padding:12px;font-family:'DM Mono',monospace;font-size:.72rem;color:var(--muted);text-align:center;}

/* ── Cards ── */
.card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r2);padding:20px;}
.card-sm{background:var(--surf2);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;}

/* ── Tags / pills ── */
.tag{display:inline-flex;align-items:center;gap:6px;font-family:'DM Mono',monospace;font-size:.65rem;padding:4px 10px;border-radius:20px;border:1px solid var(--border);color:var(--dim);}
.tag-y{border-color:rgba(232,255,71,.3);color:var(--accent);}
.tag-b{border-color:rgba(71,196,255,.3);color:var(--blue);}
.tag-g{border-color:rgba(77,255,145,.3);color:var(--green);}
.tag-remove{cursor:pointer;opacity:.6;margin-left:2px;font-size:.7rem;}
.tag-remove:hover{opacity:1;}

/* ── Pill status ── */
.pill{display:inline-flex;align-items:center;gap:5px;font-family:'DM Mono',monospace;font-size:.6rem;padding:2px 8px;border-radius:20px;border:1px solid var(--border);color:var(--muted);}
.pill-ok{border-color:rgba(77,255,145,.4);color:var(--green);}
.pill-err{border-color:rgba(255,107,107,.4);color:var(--red);}
.pill-busy{border-color:rgba(71,196,255,.4);color:var(--blue);}
.pill-dot{width:5px;height:5px;border-radius:50%;background:currentColor;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.blink{animation:blink 1s ease-in-out infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Slider ── */
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:3px;background:var(--border);border-radius:2px;outline:none;cursor:pointer;min-width:0;display:block;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent);cursor:pointer;box-shadow:0 0 6px rgba(232,255,71,.4);}

/* ── Grid ── */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}

/* ── Step 1: Setup ── */
.setup-layout{display:grid;grid-template-columns:1fr 1fr;gap:20px;padding:24px 32px;overflow-y:auto;height:calc(100vh - 108px);}
.setup-section-title{font-size:.65rem;font-family:'DM Mono',monospace;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;}

/* ── Step 2: Priorities ── */
.priorities-layout{display:grid;grid-template-columns:300px 1fr;height:calc(100vh - 108px);overflow:hidden;}
.weights-scroll{overflow-y:auto;padding:20px 16px;border-right:1px solid var(--border);}
.weights-cat{margin-bottom:18px;padding-bottom:18px;border-bottom:1px solid var(--border);}
.weights-cat:last-child{border-bottom:none;margin-bottom:0;}
.weights-cat-title{display:flex;align-items:center;gap:6px;font-size:.63rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#8888aa;margin-bottom:10px;}
.weight-type{font-family:'DM Mono',monospace;font-size:.5rem;padding:1px 6px;border-radius:3px;}
.wt-live{background:rgba(71,196,255,.1);color:var(--blue);border:1px solid rgba(71,196,255,.25);}
.wt-calc{background:rgba(180,123,255,.1);color:var(--purple);border:1px solid rgba(180,123,255,.25);}
.wt-data{background:rgba(255,179,71,.1);color:var(--orange);border:1px solid rgba(255,179,71,.25);}
.weight-row{display:flex;align-items:center;gap:6px;margin-bottom:8px;}
.weight-label{font-size:.72rem;color:var(--dim);flex:1;}
.weight-num{font-family:'DM Mono',monospace;font-size:.7rem;color:var(--accent);width:14px;text-align:right;flex-shrink:0;}
.preview-scroll{overflow-y:auto;padding:20px;}

/* ── Step 3: Output ── */
.output-layout{display:grid;grid-template-columns:1fr 1fr;gap:0;height:calc(100vh - 108px);overflow:hidden;}
.output-left{overflow-y:auto;padding:20px;border-right:1px solid var(--border);}
.output-right{overflow-y:auto;padding:20px;}
.output-tabs{display:flex;gap:0;margin-bottom:16px;border-bottom:1px solid var(--border);}
.ot{font-family:'DM Mono',monospace;font-size:.65rem;padding:8px 14px;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;transition:all .15s;text-transform:uppercase;letter-spacing:.05em;}
.ot.active{color:var(--accent);border-bottom-color:var(--accent);}

/* ── City card (results) ── */
.city-result-card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r2);padding:16px;margin-bottom:10px;cursor:pointer;position:relative;overflow:hidden;transition:border-color .2s;}
.city-result-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--border);transition:background .3s;}
.city-result-card.rank1::before{background:var(--accent);box-shadow:0 0 10px rgba(232,255,71,.4);}
.city-result-card.rank2::before{background:var(--blue);}
.city-result-card.rank3::before{background:var(--purple);}
.card-header-row{display:flex;align-items:center;gap:10px;margin-bottom:9px;}
.card-rank-num{font-family:'DM Mono',monospace;font-size:.68rem;color:var(--muted);width:22px;}
.rank1 .card-rank-num{color:var(--accent);}
.rank2 .card-rank-num{color:var(--blue);}
.rank3 .card-rank-num{color:var(--purple);}
.card-city-name{font-size:.98rem;font-weight:700;flex:1;}
.card-total{font-family:'DM Mono',monospace;font-size:1.1rem;font-weight:500;color:var(--accent);}
.expand-arrow{color:var(--muted);font-size:.75rem;}
.bar-track{height:3px;background:var(--surf2);border-radius:2px;margin-bottom:12px;overflow:hidden;}
.bar-fill{height:100%;border-radius:2px;transition:width .6s cubic-bezier(.34,1.2,.64,1);}
.rank1 .bar-fill{background:linear-gradient(90deg,var(--accent),#c8ef00);}
.rank2 .bar-fill{background:linear-gradient(90deg,var(--blue),#80dfff);}
.rank3 .bar-fill{background:linear-gradient(90deg,var(--purple),#d0a0ff);}
.city-result-card:not(.rank1):not(.rank2):not(.rank3) .bar-fill{background:#444;}
.metric-chips{display:grid;grid-template-columns:repeat(auto-fill,minmax(105px,1fr));gap:5px;}
.mchip{background:var(--surf2);border:1px solid var(--border);border-radius:5px;padding:4px 7px;position:relative;min-width:0;}
.mchip-dot{position:absolute;top:3px;right:4px;width:4px;height:4px;border-radius:50%;}
.mchip.live{border-color:rgba(71,196,255,.22);}
.mchip.calc{border-color:rgba(180,123,255,.22);}
.mchip.hi{border-color:rgba(77,255,145,.28);}
.mchip.lo{border-color:rgba(255,107,107,.28);}
.mchip-key{font-family:'DM Mono',monospace;font-size:.53rem;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.mchip-val{font-size:.82rem;font-weight:700;}
.mchip-val.hi{color:var(--green);}
.mchip-val.lo{color:var(--red);}
.mchip-raw{font-family:'DM Mono',monospace;font-size:.52rem;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.legend-row{display:flex;flex-wrap:wrap;gap:12px;margin-top:10px;font-family:'DM Mono',monospace;font-size:.6rem;color:var(--muted);}
.legend-item{display:flex;align-items:center;gap:4px;}
.ldot{width:6px;height:6px;border-radius:50%;}

/* ── Summary/charts ── */
.winner-banner{background:linear-gradient(135deg,rgba(232,255,71,.07),rgba(71,196,255,.04));border:1px solid rgba(232,255,71,.25);border-radius:var(--r2);padding:16px 20px;margin-bottom:16px;display:flex;align-items:center;gap:14px;}
.winner-flag{font-size:42px;line-height:1;}
.winner-score{font-family:'DM Mono',monospace;font-size:1.4rem;font-weight:500;color:var(--accent);}
.summary-table{width:100%;border-collapse:collapse;font-size:.76rem;}
.summary-table th{font-family:'DM Mono',monospace;font-size:.57rem;color:var(--muted);padding:6px 9px;text-align:left;border-bottom:1px solid var(--border);font-weight:400;}
.summary-table th:not(:first-child){text-align:right;}
.summary-table td{padding:7px 9px;border-bottom:1px solid rgba(34,34,46,.5);vertical-align:middle;}
.summary-table td:not(:first-child){text-align:right;}
.summary-table tr:hover td{background:rgba(255,255,255,.02);}
.mini-bar-wrap{display:flex;align-items:center;gap:5px;justify-content:flex-end;}
.mini-bar-bg{width:40px;height:3px;background:var(--surf2);border-radius:2px;overflow:hidden;}
.mini-bar-fill{height:100%;border-radius:2px;}

/* ── Metrics detail ── */
.metric-list-wrap{display:grid;grid-template-columns:190px 1fr;height:100%;overflow:hidden;}
.metric-list-inner{overflow-y:auto;padding:12px 8px;border-right:1px solid var(--border);}
.ml-cat{font-family:'DM Mono',monospace;font-size:.55rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin:10px 4px 5px;padding-bottom:3px;border-bottom:1px solid var(--border);}
.ml-item{display:flex;align-items:center;gap:7px;padding:6px 8px;border-radius:4px;cursor:pointer;font-size:.73rem;color:var(--muted);transition:all .1s;margin-bottom:2px;}
.ml-item:hover,.ml-item.active{background:var(--surf2);color:var(--text);border:1px solid var(--border);}
.ml-item:not(.active):not(:hover){border:1px solid transparent;}
.metric-detail-inner{overflow-y:auto;padding:20px 22px;}
.detail-source-link{font-family:'DM Mono',monospace;font-size:.63rem;color:var(--blue);text-decoration:none;border-bottom:1px solid rgba(71,196,255,.3);}
.logic-box{background:rgba(232,255,71,.04);border:1px solid rgba(232,255,71,.15);border-radius:var(--r);padding:11px 13px;margin:12px 0;}
.formula-box{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:11px 13px;margin:12px 0;}
.box-label{font-family:'DM Mono',monospace;font-size:.56rem;text-transform:uppercase;letter-spacing:.08em;color:var(--accent);margin-bottom:5px;}
.formula-box .box-label{color:var(--muted);}
.logic-box p{font-size:.76rem;color:var(--dim);line-height:1.65;}
.formula-box pre{font-family:'DM Mono',monospace;font-size:.7rem;color:var(--blue);white-space:pre-wrap;line-height:1.65;margin:0;}
.metric-score-table{width:100%;border-collapse:collapse;font-size:.76rem;}
.metric-score-table th{font-family:'DM Mono',monospace;font-size:.56rem;color:var(--muted);padding:5px 8px;border-bottom:1px solid var(--border);font-weight:400;text-align:left;}
.metric-score-table td{padding:7px 8px;border-bottom:1px solid rgba(34,34,46,.5);}
.score-bar-wrap{display:flex;align-items:center;gap:7px;}
.score-bar-bg{flex:1;max-width:90px;height:4px;background:var(--surf2);border-radius:2px;overflow:hidden;}
.score-bar-fill{height:100%;background:var(--accent);border-radius:2px;}
.score-num{font-family:'DM Mono',monospace;font-size:.7rem;width:26px;text-align:right;}
.score-num.hi{color:var(--green);}
.score-num.lo{color:var(--red);}

/* ── Empty/onboarding ── */
.onboard-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;color:var(--muted);font-family:'DM Mono',monospace;font-size:.78rem;text-align:center;padding:40px;}
.onboard-empty .big{font-size:3rem;opacity:.4;}

/* ── Status bar ── */
.status-bar{display:flex;gap:5px;flex-wrap:wrap;padding:7px 32px;border-bottom:1px solid var(--border);min-height:34px;align-items:center;background:rgba(17,17,24,.8);}

/* ── Fetch button ── */
.fetch-btn{background:var(--accent);color:var(--bg);border:none;padding:9px 18px;font-family:'Syne',sans-serif;font-weight:700;font-size:.78rem;cursor:pointer;border-radius:var(--r);display:flex;align-items:center;gap:7px;transition:all .15s;white-space:nowrap;}
.fetch-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 6px 20px rgba(232,255,71,.25);}
.fetch-btn:disabled{opacity:.4;cursor:not-allowed;}

/* ── Responsive ── */
@media(max-width:760px){
  /* Allow the page to scroll naturally on mobile */
  html,body{height:auto;overflow-y:auto;}
  .page{min-height:100vh;height:auto;}
  .app-body{overflow:visible;}
  /* ── Single-column everything ── */
  .setup-layout,.priorities-layout,.output-layout,.grid2,.grid3,.metric-list-wrap{
    grid-template-columns:1fr;
  }
  /* ── Kill fixed heights on all panels — scroll naturally ── */
  .setup-layout,.priorities-layout,.output-layout,.weights-scroll,.preview-scroll,
  .output-left,.output-right,.metric-list-inner,.metric-detail-inner{
    height:auto;max-height:none;overflow:visible;
  }
  /* ── Remove side borders that made sense in 2-col but not 1-col ── */
  .weights-scroll,.metric-list-inner{border-right:none;border-bottom:1px solid var(--border);}
  /* ── Header ── */
  .app-header{padding:12px 14px 0;}
  h1{font-size:1.3rem;}
  /* ── Reduce padding on all layout containers ── */
  .setup-layout{padding:12px 14px;}
  .output-left,.output-right{padding:12px;}
  /* ── Step bar: compress text ── */
  .step-item{padding:8px 10px;font-size:.58rem;letter-spacing:.03em;}
  .step-num{width:16px;height:16px;font-size:.5rem;}
  /* ── Cards ── */
  .card{padding:14px;}
  /* ── Autocomplete dropdown: ensure it doesn't overflow viewport ── */
  .ac-dropdown{max-height:180px;}
  /* ── Anchor editor: stack the 3-column add form ── */
  .anchor-add-grid{grid-template-columns:1fr!important;}
  /* ── Output tabs: wrap and compress ── */
  .output-tabs{flex-wrap:wrap;gap:0;}
  .ot{font-size:.6rem;padding:7px 10px;}
  /* ── City result cards: smaller chips ── */
  .metric-chips{grid-template-columns:repeat(auto-fill,minmax(90px,1fr));}
  .mchip-val{font-size:.74rem;}
  /* ── Summary charts: don't let canvas overflow ── */
  .charts-row{grid-template-columns:1fr;}
  canvas{max-width:100%;}
  /* ── Priority weights panel ── */
  .weights-cat-title{font-size:.6rem;}
  .weight-label{font-size:.66rem;}
  /* ── Metric list: horizontal scroll instead of sidebar ── */
  .metric-list-wrap{display:flex;flex-direction:column;}
  .metric-list-inner{display:flex;flex-wrap:wrap;gap:4px;padding:10px;border-bottom:1px solid var(--border);border-right:none;}
  .ml-cat{display:none;}
  .ml-item{padding:4px 8px;font-size:.62rem;border:1px solid var(--border)!important;}
  /* ── Summary table: allow horizontal scroll ── */
  .table-box{overflow-x:auto;}
  /* ── Fetch button: full width on mobile ── */
  .fetch-btn{width:100%;justify-content:center;}
  /* ── Winner banner: stack ── */
  .winner-banner{flex-direction:column;gap:8px;}
  .winner-flag{font-size:32px;}
}
</style>
</head>
<body>
<div id="root"></div>
<script>
// ═══════════════════════════════════════════════════════════════
//  CITY DATABASE — 76 cities, 28 countries
// ═══════════════════════════════════════════════════════════════
const CITY_DB=[
  {city:"Tel Aviv",country:"Israel",flag:"🇮🇱",lat:32.0853,lon:34.7818,numbeo:"Tel-Aviv"},
  {city:"Jerusalem",country:"Israel",flag:"🇮🇱",lat:31.7683,lon:35.2137,numbeo:"Jerusalem"},
  {city:"Haifa",country:"Israel",flag:"🇮🇱",lat:32.794,lon:34.9896,numbeo:"Haifa"},
  {city:"London",country:"United Kingdom",flag:"🇬🇧",lat:51.5074,lon:-0.1278,numbeo:"London"},
  {city:"Manchester",country:"United Kingdom",flag:"🇬🇧",lat:53.4808,lon:-2.2426,numbeo:"Manchester"},
  {city:"Edinburgh",country:"United Kingdom",flag:"🇬🇧",lat:55.9533,lon:-3.1883,numbeo:"Edinburgh"},
  {city:"Birmingham",country:"United Kingdom",flag:"🇬🇧",lat:52.4862,lon:-1.8904,numbeo:"Birmingham"},
  {city:"Bristol",country:"United Kingdom",flag:"🇬🇧",lat:51.4545,lon:-2.5879,numbeo:"Bristol"},
  {city:"Berlin",country:"Germany",flag:"🇩🇪",lat:52.52,lon:13.405,numbeo:"Berlin"},

//  CALCULATION ENGINE (pure functions)
// ═══════════════════════════════════════════════════════════════
const clamp=(v,lo=0,hi=10)=>Math.max(lo,Math.min(hi,v));
const haversineKm=(lat1,lon1,lat2,lon2)=>{
  const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
};

const scoreAirQuality=pm25=>clamp(10-(pm25-5)*(10/30));
const scoreCarFree=pct=>clamp(pct/7.3);
const scoreComfortDays=(temps,min=10,max=25)=>{
  const days=temps.reduce((s,t)=>{
    if(t>=min&&t<=max)return s+1;
    if(t>max&&t<=max+3)return s+(max+3-t)/3;
    if(t>=min-3&&t<min)return s+(t-(min-3))/3;
    return s;
  },0);
  return{score:clamp((days-150)/9),raw:Math.round(days)+" days/yr"};
};
const scoreSunshine=rads=>{
  const h=rads.reduce((a,b)=>a+b,0)*0.6;
  return{score:clamp((h-1200)/230),raw:Math.round(h)+"h/yr"};
};
// locationMultiplier: 1.0=city center, 0.67=outside center, 0.45=countryside
const scoreRent=(usd,locationMultiplier=1.0)=>clamp(10-((usd*locationMultiplier)-500)/400);
const scoreSafety=idx=>clamp(idx/10);
const scoreHealthcare=idx=>clamp(idx/10);
const scoreInternet=mbps=>clamp((mbps-50)/15);
const scoreLang=(efEpi,userLangs,localLang)=>{
  const base=clamp((efEpi-400)/30);
  const speaks=userLangs.some(l=>l.toLowerCase()===localLang?.toLowerCase()||
    (["english"].includes(l.toLowerCase())&&["English"].includes(localLang)));
  return clamp(speaks?base+3:base);
};
const scoreVisa=(passports,country,rights,equityEur=0,profession="Not specified")=>{
  // Step 1: best score from passports alone
  let best={score:3,label:"No passport data — assumed difficult",goldenVisa:null};
  for(const p of passports){
    const r=rights[p]||{};
    const entry=r[country]||r["EU"]||r["European"];
    if(entry&&entry.score>best.score)best={...best,...entry,goldenVisa:null};
  }

  // Step 2: profession fast-track boost
  // Many countries have shortage occupation lists that simplify/accelerate visas.
  // If your profession is in high demand (score 8+) and visa path is not already easy,
  // some countries offer faster/lower-threshold routes.
  if(profession&&profession!=="Not specified"&&best.score<10){
    const demand=(PROFESSION_DEMAND[profession]||{})[country]||5;
    if(demand>=9&&best.score<8){
      // Critical shortage — many countries fast-track these (UK Shortage Occupation List,
      // German Fachkräfteeinwanderungsgesetz, NL shortage register, etc.)
      best={
        ...best,
        score:Math.min(best.score+2,8),
        label:best.label+` · ✅ ${profession} on shortage list — expedited route available`,
      };
    } else if(demand>=7&&best.score<7){
      best={
        ...best,
        score:Math.min(best.score+1,7),
        label:best.label+` · ⚡ ${profession} in high demand — stronger application`,
      };
    }
  }

  // Step 3: golden visa — only when no easy path exists (score < 8)
  if(equityEur>0&&best.score<8){
    const gv=GOLDEN_VISA[country];
    if(gv&&gv.threshold&&equityEur>=gv.threshold){
      const gvScore=9;
      if(gvScore>best.score){
        return{
          score:gvScore,
          label:`Golden visa via investment (€${(gv.threshold/1000).toFixed(0)}k min). ${gv.note||""}`,
          goldenVisa:true
        };
      }
    } else if(gv&&gv.threshold&&equityEur>=gv.threshold*0.5){
      best.label+=` · ⚡ Golden visa possible at €${(gv.threshold/1000).toFixed(0)}k (you have €${(equityEur/1000).toFixed(0)}k)`;
    }
  }

  return best;
};

// ── scoreBureau: bureaucracy ease as a function of passport + profession ───
// Base = country bureaucracy difficulty (from CITY_STATIC)
// Modified by:
//   - Whether user is already a citizen in that country → full 10
//   - Profession on shortage list → some friction removed (fast-track)
//   - Profession requiring local licence (doctors, lawyers, architects) → more friction
const scoreBureau=(baseScore, country, passports, profession, visaScore)=>{
  // If already citizen (visa score 10), bureaucracy is home-country level — use base
  if(visaScore>=10) return{score:baseScore, raw:"Citizen — home admin"};

  let score=baseScore;
  let notes=[];

  // Shortage profession boost: fast-tracked admin, professional recognition supported
  const demand=(PROFESSION_DEMAND[profession]||{})[country]||5;
  if(profession&&profession!=="Not specified"&&demand>=9){
    score=Math.min(score+1.5,9);
    notes.push("shortage fast-track");
  }

  // Regulated profession penalty: doctors, lawyers, architects need licence recognition
  // This adds real admin friction regardless of visa status
  const REGULATED=["Doctor / Physician","Nurse","Lawyer / Legal","Architect / Urban Planner"];
  if(REGULATED.includes(profession)){
    score=Math.max(score-1.5,1);
    notes.push("licence recognition required");
  }

  // Language-barrier penalty already partially captured in base score (e.g. Germany=2)
  // but if base is already low, don't double-penalise

  const raw=notes.length
    ?notes.join(" · ")
    :score>=8?"Straightforward":score>=5?"Moderate friction":"High friction — see notes";

  return{score:clamp(score), raw};
};
const scoreFamily=(lat,lon,anchors)=>{
  if(!anchors.length)return{score:5,raw:"No anchors set"};
  const total=anchors.reduce((s,a)=>s+a.weight,0)||1;
  const sc=anchors.reduce((sum,a)=>{
    const km=haversineKm(lat,lon,a.lat,a.lon);
    return sum+(a.weight/total)*Math.max(1,10-(km/10000)*9);
  },0);
  const details=anchors.map(a=>{
    const km=Math.round(haversineKm(lat,lon,a.lat,a.lon));
    return `${a.label}: ${km}km`;
  }).join(" | ");
  return{score:clamp(sc),raw:details};
};
const scoreProximity=(lat,lon,anchors)=>{
  if(!anchors.length)return{score:5,raw:"No people added"};
  const total=anchors.reduce((s,a)=>s+a.weight,0)||1;
  const sc=anchors.reduce((sum,a)=>{
    const km=haversineKm(lat,lon,a.lat,a.lon);
    return sum+(a.weight/total)*Math.max(1,10-(km/6500)*9);
  },0);
  const details=anchors.map(a=>`${a.label}: ${Math.round(haversineKm(lat,lon,a.lat,a.lon))}km`).join(" | ");
  return{score:clamp(sc),raw:details};
};
const scoreTravel=(conn,cost)=>clamp((conn+cost)/2);
const scoreBeauty=pct=>clamp((pct-65)/(84-65)*10);

const scoreCityTotal=(scores,weights)=>{
  const keys=Object.keys(weights);
  let t=0,mx=0;
  for(const k of keys){t+=(scores[k]??0)*(weights[k]??0);mx+=10*(weights[k]??0);}
  return mx>0?(t/mx)*100:0;
};

// ── Score: golden visa access given user's equity ──────────
// Returns 0-10: 10 = golden visa accessible at user's equity level
// 0 = no program or equity far below threshold
function scoreGoldenVisa(country, equityEur){
  const gv=GOLDEN_VISA[country];
  if(!gv||!gv.threshold) return 0; // no program
  if(equityEur<=0) return 0;
  if(equityEur>=gv.threshold) return 10; // fully qualifies
  // Partial: approaching threshold
  return clamp((equityEur/gv.threshold)*10);
}

// ── Score: profession demand in destination country ─────────
function scoreProfession(country, profession){
  if(!profession||profession==="Not specified") return 5; // neutral
  const demandMap=PROFESSION_DEMAND[profession]||PROFESSION_DEMAND["Other"]||{};
  return clamp(demandMap[country]||5);
}

// ── Score: education quality (PISA) ────────────────────────
// Only relevant if user has children
function scoreEducation(country){
  return scorePISA(PISA_SCORE[country]||470);
}

// ── Score: nature / outdoor access ────────────────────────
// From CITY_STATIC.nature (0-10 composite)
function scoreNature(cityName){
  return clamp(CITY_STATIC[cityName]?.nature||5);
}


function buildScores(cityName,cityDb,config,liveData){
  const db=CITY_DB.find(c=>c.city===cityName)||{};
  const s=CITY_STATIC[cityName]||{};
  const nb=NUMBEO_FB[cityName]||{};
  const live=liveData[cityName]||{};
  const country=db.country||"";

  const airQ=live.airQ??scoreAirQuality(11);
  const tempScore=live.temp??5;
  const sunScore=live.sun??clamp((s.staticSunH-1200)/230);
  const LOCATION_MULT={"city-center":1.0,"outside-center":0.67,"countryside":0.45};
  const locationMult=LOCATION_MULT[config.housingLocation||"city-center"];
  const rentS=live.rent??scoreRent(nb.rentUSD||1500, locationMult);
  const safetyS=live.safety??scoreSafety(nb.safetyIdx||50);
  const healthS=live.healthcare??scoreHealthcare(nb.healthcareIdx||65);
  const carFreeS=scoreCarFree(s.carFreePct||50);
  const noWar=s.noWar??10;
  const bureau=s.bureau??5;
  const travelS=scoreTravel(s.travelConn||7,s.travelCost||7);
  const beauty=scoreBeauty(s.beautyGR||70);
  const internet=scoreInternet(s.internetMbps||100);
  const social=clamp(s.socialScore||6);
  const visaResult=scoreVisa(config.passports,country,PASSPORT_RIGHTS,config.equityEur||0,config.profession);
  const bureauResult=scoreBureau(s.bureau??5, country, config.passports, config.profession, visaResult.score);
  const familyS=scoreFamily(db.lat,db.lon,config.familyAnchors);
  const proxRes=scoreProximity(db.lat,db.lon,config.proximityAnchors);
  const langS=scoreLang(EF_EPI[country]||500,config.languages,LOCAL_LANG[country]);
  const profS=scoreProfession(country,config.profession);
  const educationS=config.hasChildren?scoreEducation(country):5;
  const natureS=scoreNature(cityName);

  // Visa raw label includes golden visa note if it was the deciding factor
  const visaRawLabel=visaResult.goldenVisa
    ?visaResult.label
    :visaResult.label+(config.equityEur>0&&GOLDEN_VISA[country]?.threshold&&config.equityEur<GOLDEN_VISA[country].threshold
      ?` · ⚡ €${(config.equityEur/1000).toFixed(0)}k / €${(GOLDEN_VISA[country].threshold/1000).toFixed(0)}k for golden visa`
      :"");

  return{
    scores:{airQ,carFree:carFreeS,temp:tempScore,sun:sunScore,rent:rentS,safety:safetyS,
      noWar,visa:visaResult.score,bureau:bureauResult.score,family:familyS.score,proximity:proxRes.score,
      travel:travelS,lang:langS,beauty,healthcare:healthS,internet,social,
      profession:profS,education:educationS,nature:natureS},
    raws:{
      airQ:live.airQRaw||"~11 µg/m³ est.",
      temp:live.tempRaw||"static est.",sun:live.sunRaw||(s.staticSunH+"h/yr"),
      rent:live.rentRaw
        ?live.rentRaw+(locationMult<1?" × "+locationMult+"":"")
        :"~$"+Math.round((nb.rentUSD||1500)*locationMult)+"/mo est.",
      safety:live.safetyRaw||(nb.safetyIdx+"/100 est."),
      healthcare:live.healthcareRaw||(nb.healthcareIdx+"/100 est."),
      carFree:s.carFreePct+"%",noWar:noWar===0?"⚠️ Active conflict":"Peaceful",
      visa:visaRawLabel,bureau:bureauResult.raw,
      family:familyS.raw,proximity:proxRes.raw,
      lang:"EF EPI "+(EF_EPI[country]||"?"),
      beauty:s.beautyGR+"% golden ratio",internet:s.internetMbps+" Mbps",
      social:s.socialScore+"/10",travel:"Conn:"+s.travelConn+" Cost:"+s.travelCost,
      profession:config.profession&&config.profession!=="Not specified"
        ?config.profession+" demand: "+(PROFESSION_DEMAND[config.profession]?.[country]||"?")+"/10"
        :"Not specified",
      education:config.hasChildren?("PISA 2022: "+(PISA_SCORE[country]||"?")):"N/A",
      nature:(s.nature||5)+"/10",
    },
    isLive:{airQ:!!live.airQ,temp:!!live.temp,sun:!!live.sun,
      rent:!!live.rent,safety:!!live.safety,healthcare:!!live.healthcare},
  };
}

const{createElement:h,useState,useEffect,useCallback,useMemo,useRef}=React;
const e=(tag,props,...children)=>h(tag,props,...children);

// ── CityAutocomplete ─────────────────────────────────────────
function CityAutocomplete({value,onChange,onSelect,placeholder="Type a city…",excludeIds=[],_inputRef}){
  const[open,setOpen]=useState(false);
  const[sel,setSel]=useState(-1);
  const ref=useRef(null);
  const filtered=useMemo(()=>{
    if(!value||value.length<1)return[];
    const q=value.toLowerCase();
    return CITY_DB
      .filter(c=>!excludeIds.includes(c.city+"|"+c.country))
      .filter(c=>c.city.toLowerCase().includes(q)||c.country.toLowerCase().includes(q))
      .slice(0,8);
  },[value,excludeIds]);

  useEffect(()=>{
    const handler=ev=>{if(ref.current&&!ref.current.contains(ev.target))setOpen(false);};
    document.addEventListener("mousedown",handler);
    return()=>document.removeEventListener("mousedown",handler);
  },[]);

  return e("div",{className:"autocomplete-wrap",ref},
    e("input",{className:"input",value,placeholder,ref:_inputRef,
      onChange:ev=>{onChange(ev.target.value);setOpen(true);setSel(-1);},
      onFocus:()=>{if(filtered.length)setOpen(true);},
      onKeyDown:ev=>{
        if(ev.key==="ArrowDown"){ev.preventDefault();setSel(s=>Math.min(s+1,filtered.length-1));}
        else if(ev.key==="ArrowUp"){ev.preventDefault();setSel(s=>Math.max(s-1,0));}
        else if(ev.key==="Enter"&&sel>=0&&filtered[sel]){ev.preventDefault();onSelect(filtered[sel]);setOpen(false);}
        else if(ev.key==="Escape")setOpen(false);
        else if(ev.key==="Tab")setOpen(false);
      }
    }),
    open&&filtered.length>0&&e("div",{className:"ac-dropdown"},
      filtered.map((c,i)=>e("div",{
        key:c.city+c.country,
        className:"ac-item"+(i===sel?" selected":""),
        onMouseDown:()=>{onSelect(c);setOpen(false);},
        onMouseEnter:()=>setSel(i),
      },
        e("span",{className:"ac-flag"},c.flag),
        e("div",{className:"ac-main"},
          e("div",{className:"ac-city"},c.city),
          e("div",{className:"ac-country"},c.country),
        )
      ))
    ),
    open&&value.length>=1&&filtered.length===0&&
      e("div",{className:"ac-dropdown"},e("div",{className:"ac-empty"},"No cities found for \""+value+"\""))
  );
}

// ── PassportSelect ───────────────────────────────────────────
function PassportSelect({passports,onChange}){
  const[input,setInput]=useState("");
  const[open,setOpen]=useState(false);
  const[selIdx,setSelIdx]=useState(-1);
  const ref=useRef(null);
  const dropRef=useRef(null);
  const filtered=useMemo(()=>{
    const q=input.toLowerCase();
    return ALL_PASSPORTS.filter(p=>p.toLowerCase().includes(q)&&!passports.includes(p));
  },[input,passports]);
  useEffect(()=>{
    const h=ev=>{if(ref.current&&!ref.current.contains(ev.target))setOpen(false);};
    document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h);
  },[]);
  // Scroll selected item into view
  useEffect(()=>{
    if(selIdx<0||!dropRef.current)return;
    const item=dropRef.current.children[selIdx];
    if(item)item.scrollIntoView({block:"nearest"});
  },[selIdx]);
  const add=p=>{onChange([...passports,p]);setInput("");setOpen(false);setSelIdx(-1);};
  return e("div",null,
    e("div",{className:"autocomplete-wrap",ref},
      e("input",{className:"input",value:input,placeholder:"Search passport nationality…",
        onChange:ev=>{setInput(ev.target.value);setOpen(true);setSelIdx(-1);},
        onFocus:()=>{setOpen(true);setSelIdx(-1);},
        onKeyDown:ev=>{
          if(!open)return;
          if(ev.key==="ArrowDown"){ev.preventDefault();setSelIdx(s=>Math.min(s+1,filtered.length-1));}
          else if(ev.key==="ArrowUp"){ev.preventDefault();setSelIdx(s=>Math.max(s-1,0));}
          else if(ev.key==="Enter"&&selIdx>=0&&filtered[selIdx]){ev.preventDefault();add(filtered[selIdx]);}
          else if(ev.key==="Escape"){setOpen(false);setSelIdx(-1);}
          else if(ev.key==="Tab"){setOpen(false);}
        },
      }),
      open&&filtered.length>0&&e("div",{className:"ac-dropdown",ref:dropRef},
        filtered.map((p,i)=>e("div",{
          key:p,className:"ac-item"+(i===selIdx?" selected":""),
          onMouseDown:ev=>{ev.preventDefault();add(p);},
          onMouseEnter:()=>setSelIdx(i),
        },e("div",{className:"ac-main"},e("div",{className:"ac-city"},p))))
      ),
      open&&filtered.length===0&&input.length>0&&
        e("div",{className:"ac-dropdown"},e("div",{className:"ac-empty"},"No match for \""+input+"\""))
    ),
    e(TagList,{items:passports,onRemove:i=>onChange(passports.filter((_,j)=>j!==i)),
      colorClass:"tag-y",renderItem:p=>e("span",null,"🛂 ",p)}),
  );
}

            onMouseDown:ev=>{ev.preventDefault();setNewType("people");}

// ── API fetchers ─────────────────────────────────────────────
async function fetchWeather(city,comfortMin,comfortMax){
  const url="https://climate-api.open-meteo.com/v1/climate?latitude="+city.lat+"&longitude="+city.lon+"&start_date=2010-01-01&end_date=2010-12-31&models=EC_Earth3P_HR&daily=temperature_2m_mean,shortwave_radiation_sum";
  const r=await fetch(url);if(!r.ok)throw new Error("HTTP "+r.status);
  const d=await r.json();if(d.error)throw new Error(d.reason||"API error");
  const temps=(d.daily?.temperature_2m_mean||[]).filter(v=>v!=null);
  const rads=(d.daily?.shortwave_radiation_sum||[]).filter(v=>v!=null);
  if(!temps.length)throw new Error("no temp data");
  const{score:tempScore,raw:tempRaw}=scoreComfortDays(temps,comfortMin,comfortMax);
  const{score:sunScore,raw:sunRaw}=scoreSunshine(rads.length?rads:[city.staticSunH||2000/0.6]);
  return{temp:tempScore,tempRaw,sun:sunScore,sunRaw};
}
async function fetchAir(city){
  const end=new Date();end.setDate(end.getDate()-1);
  const start=new Date(end);start.setFullYear(start.getFullYear()-1);
  const fmt=d=>d.toISOString().slice(0,10);
  const url="https://air-quality-api.open-meteo.com/v1/air-quality?latitude="+city.lat+"&longitude="+city.lon+"&hourly=pm2_5&start_date="+fmt(start)+"&end_date="+fmt(end)+"&timezone=UTC";
  const r=await fetch(url);if(!r.ok)throw new Error("HTTP "+r.status);
  const d=await r.json();if(d.error)throw new Error(d.reason||"API error");
  const vals=(d.hourly?.pm2_5||[]).filter(v=>v!=null&&v>=0&&v<500);
  if(!vals.length)throw new Error("no PM2.5 data");
  const mean=vals.reduce((a,b)=>a+b,0)/vals.length;
  return{airQ:scoreAirQuality(mean),airQRaw:mean.toFixed(1)+" µg/m³"};
}
async function fetchNumbeoCity(slug,path){
  const url="https://corsproxy.io/?"+encodeURIComponent("https://www.numbeo.com/"+path+"/in/"+slug);
  const r=await fetch(url);if(!r.ok)throw new Error("proxy "+r.status);
  return r.text();
}
async function fetchNumbeo(city){
  const slug=CITY_DB.find(c=>c.city===city.city)?.numbeo||city.city.replace(/\s/g,"-");
  const res={};
  try{
    const h=await fetchNumbeoCity(slug,"cost-of-living");
    const m=h.match(/Apartment \(1 bedroom\) in City Centre[^<]*<\/td>\s*<td[^>]*>\s*([\d,.]+)/s);
    if(m){const v=parseFloat(m[1].replace(/,/g,""));res.rent=scoreRent(v);res.rentRaw="$"+Math.round(v)+"/mo";}
  }catch{}
  await new Promise(r=>setTimeout(r,250));
  try{
    const h=await fetchNumbeoCity(slug,"crime");
    const m=h.match(/Safety Index.*?<td[^>]*>\s*([\d.]+)/s);
    if(m){const v=parseFloat(m[1]);res.safety=scoreSafety(v);res.safetyRaw=v.toFixed(1)+"/100";}
  }catch{}
  await new Promise(r=>setTimeout(r,250));
  try{
    const h=await fetchNumbeoCity(slug,"health-care");
    const m=h.match(/Health Care Index.*?<td[^>]*>\s*([\d.]+)/s);
    if(m){const v=parseFloat(m[1]);res.healthcare=scoreHealthcare(v);res.healthcareRaw=v.toFixed(1)+"/100";}
  }catch{}
  return res;
}

// ── EquityInput ───────────────────────────────────────────────
// Keeps a local string draft so the user can type freely.
// Only commits the numeric value to parent state on blur or Enter.
function EquityInput({value,onChange}){
  const[draft,setDraft]=useState(value>0?String(value):"");
  const commit=()=>{
    const n=parseFloat(draft.replace(/[^0-9.]/g,""))||0;
    setDraft(n>0?String(n):"");
    onChange(n);
  };
  // Sync if parent resets to 0
  useEffect(()=>{if(value===0&&draft!=="")setDraft("");},[value]);
  return e("div",{style:{display:"flex",alignItems:"center",gap:8}},
    e("input",{
      className:"input",
      type:"text",
      inputMode:"numeric",
      value:draft,
      placeholder:"e.g. 500000",
      onChange:ev=>setDraft(ev.target.value),
      onBlur:commit,
      onKeyDown:ev=>{if(ev.key==="Enter"){ev.target.blur();}},
      style:{flex:1},
    }),
    e("div",{style:{fontFamily:"DM Mono,monospace",fontSize:".7rem",color:"var(--muted)",flexShrink:0}},"USD")
  );
}

    style:{background:"var(--surf2)",border:"1px solid var(--border)",borderRadius:"var(--r)",padding:"16px 18px",marginBottom:12}
  },
    e("div",{style:{display:"flex",alignItems:"center",gap:8,marginBottom:3}},
      e("span",{style:{fontSize:20}},icon),
      e("div",{style:{fontWeight:700,fontSize:".9rem"}},title)
    ),
    e("div",{style:{fontFamily:"DM Mono,monospace",fontSize:".6rem",color:"var(--muted)",marginBottom:10,lineHeight:1.55}},desc),
    children
  );

  const wrap=(children)=>e("div",{style:{padding:"20px 28px",maxWidth:680}},children);

  if(screen===0) return wrap(e("div",null,
    e(CircumCard,{icon:"📍",title:"Your current city",desc:"Where are you living right now?"},
      e(CityAutocomplete,{
        value:setup.currentCityInput||"",
        onChange:v=>onChange({...setup,currentCityInput:v,currentCity:null}),
        placeholder:"Search your current city…",
        onSelect:c=>onChange({...setup,currentCity:c,currentCityInput:c.flag+" "+c.city+", "+c.country}),
      }),
      setup.currentCity&&e("div",{style:{fontFamily:"DM Mono,monospace",fontSize:".68rem",color:"var(--green)",marginTop:6}},
        "✓ ",setup.currentCity.flag," ",setup.currentCity.city,", ",setup.currentCity.country)
    ),
    e(CircumCard,{icon:"🏙️",title:"Cities to compare",desc:"Pick 2–8 cities you're considering. Start typing to search from "+CITY_DB.length+"+ cities worldwide."},
      e(CityPickerList,{
        cities:setup.cities,
        onAdd:c=>onChange({...setup,cities:[...setup.cities,c]}),
        onRemove:i=>onChange({...setup,cities:setup.cities.filter((_,j)=>j!==i)}),
        placeholder:"Search cities…",maxItems:8
      }),
      setup.cities.length<2&&e("div",{style:{fontFamily:"DM Mono,monospace",fontSize:".63rem",color:"var(--orange)",marginTop:6}},"Add at least 2 cities to continue")
    ),
    e(CircumCard,{icon:"🛂",title:"Your passports",desc:"Visa scores use your best available passport per destination. Add all you hold."},
      e(PassportSelect,{passports:setup.passports,onChange:p=>onChange({...setup,passports:p})})
    )
  ));

  if(screen===1) return wrap(e("div",null,
    e(CircumCard,{icon:"🧑‍💼",title:"Your profession",
      desc:"Affects job market demand per city. In-shortage professions make immigration easier and salaries higher. Source: EURES 2024."},
      e("select",{className:"input",value:setup.profession||"Not specified",onChange:ev=>onChange({...setup,profession:ev.target.value}),style:{cursor:"pointer",width:"100%"}},
        ["Not specified",...Object.keys(PROFESSION_DEMAND)].map(p=>e("option",{key:p,value:p},p))),
      setup.profession&&setup.profession!=="Not specified"&&e("div",{style:{fontFamily:"DM Mono,monospace",fontSize:".63rem",color:"var(--accent)",marginTop:5}},"✓ "+setup.profession+" — demand scored per destination")
    ),
    e(CircumCard,{icon:"💰",title:"Available equity",
      desc:"Investable capital can unlock golden visa residency — bypassing a difficult work visa. Only affects scoring when your normal visa path is hard. Leave at 0 if not applicable."},
      e(EquityInput,{value:setup.equityUsd||0,onChange:v=>onChange({...setup,equityUsd:v})}),
      setup.equityUsd>0&&e("div",{style:{fontFamily:"DM Mono,monospace",fontSize:".63rem",color:"var(--accent)",marginTop:5}},
        "✓ $"+(setup.equityUsd>=1000000?(setup.equityUsd/1000000).toFixed(1)+"M":(setup.equityUsd/1000).toFixed(0)+"k")+" ≈ €"+Math.round(setup.equityUsd/1080)+"k — will check golden visa thresholds")
    ),
    e(CircumCard,{icon:"👶",title:"Do you have children?",
      desc:"Activates the Education quality metric (PISA 2022 country scores)."},
      e("div",{style:{display:"flex",gap:8}},
        ...[["Yes — I have children",true,"var(--accent)","rgba(232,255,71,.4)","rgba(232,255,71,.1)"],
            ["No",false,"var(--blue)","rgba(71,196,255,.4)","rgba(71,196,255,.1)"]
        ].map(([lbl,val,col,border,bg])=>e("button",{key:String(val),
          style:{flex:1,padding:"11px",border:"1px solid "+(setup.hasChildren===val?border:"var(--border)"),background:setup.hasChildren===val?bg:"transparent",color:setup.hasChildren===val?col:"var(--muted)",borderRadius:"var(--r)",cursor:"pointer",fontFamily:"Syne,sans-serif",fontWeight:700,fontSize:".82rem",transition:"all .15s"},
          onClick:()=>onChange({...setup,hasChildren:val})},lbl))
      ),
      setup.hasChildren&&e("div",{style:{fontFamily:"DM Mono,monospace",fontSize:".63rem",color:"var(--green)",marginTop:6}},"✓ Education quality metric active (PISA 2022)")
    ),
    e(CircumCard,{icon:"💬",title:"Languages you speak",
      desc:"Boosts language ease score (+3 pts) when you speak the local language."},
      e(LanguageSelect,{languages:setup.languages,onChange:l=>onChange({...setup,languages:l})})
    )
  ));

  if(screen===2) return wrap(e("div",null,
    e(CircumCard,{icon:"👥",title:"Family & friends locations",
      desc:"Add the people and places that matter. Toggle 👨‍👩‍👧 family (affects family proximity score) vs 👤 person (friends score). Weights must total 100%. All optional."},
      e(AnchorEditor,{
        anchors:setup.allAnchors||[],
        onChange:a=>onChange({...setup,allAnchors:a,familyAnchors:a.filter(x=>x.type==="family"),proximityAnchors:a.filter(x=>x.type==="people")}),
      })
    )
  ));

  if(screen===3) return wrap(e("div",null,
    e(CircumCard,{icon:"🏠",title:"Where will you live within the city?",
      desc:"Rent scores are adjusted based on this. City centre is most expensive; countryside ~55% cheaper. Sourced from Numbeo centre vs outside-centre price ratios."},
      e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}},
        ...[
          ["city-center","🏙️","City centre","1.0× rent"],
          ["outside-center","🏘️","Outside centre","~0.67×"],
          ["countryside","🌿","Countryside","~0.45×"],
        ].map(([val,em,lbl,sub])=>e("button",{key:val,
          style:{padding:"14px 8px",border:"1px solid "+(setup.housingLocation===val?"rgba(232,255,71,.4)":"var(--border)"),background:setup.housingLocation===val?"rgba(232,255,71,.1)":"transparent",color:setup.housingLocation===val?"var(--accent)":"var(--muted)",borderRadius:"var(--r)",cursor:"pointer",fontFamily:"DM Mono,monospace",fontSize:".65rem",lineHeight:1.6,transition:"all .15s",textAlign:"center"},
          onClick:()=>onChange({...setup,housingLocation:val})},
          e("div",{style:{fontSize:22,marginBottom:4}},em),
          e("div",{style:{fontWeight:700}},lbl),
          e("div",{style:{opacity:.7,fontSize:".58rem"}},sub)
        ))
      ),
      setup.housingLocation&&e("div",{style:{fontFamily:"DM Mono,monospace",fontSize:".63rem",color:"var(--accent)",marginTop:8}},
        "✓ Rent adjusted for "+(setup.housingLocation==="city-center"?"city centre":setup.housingLocation==="outside-center"?"outside centre":"countryside"))
    ),
    e(CircumCard,{icon:"🌡️",title:"Temperature comfort range",
      desc:"Days within this band count as 'comfortable'. Adjust to match your preference."},
      e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}},
        e("div",null,
          e("div",{style:{fontFamily:"DM Mono,monospace",fontSize:".6rem",color:"var(--muted)",marginBottom:5}},"MIN °C"),
          e("input",{className:"input",type:"number",value:setup.tempMin,onChange:ev=>onChange({...setup,tempMin:+ev.target.value})})
        ),
        e("div",null,
          e("div",{style:{fontFamily:"DM Mono,monospace",fontSize:".6rem",color:"var(--muted)",marginBottom:5}},"MAX °C"),
          e("input",{className:"input",type:"number",value:setup.tempMax,onChange:ev=>onChange({...setup,tempMax:+ev.target.value})})
        )
      ),
      e("div",{style:{fontFamily:"DM Mono,monospace",fontSize:".63rem",color:"var(--muted)",marginTop:6}},
        "Comfort zone: "+setup.tempMin+"°C – "+setup.tempMax+"°C")
    )
  ));

  return null;
}

// ── Step 2: Priorities ───────────────────────────────────────
function PrioritiesStep({weights,onChange,ranked}){
  return e("div",{className:"priorities-layout"},
    e("div",{className:"weights-scroll"},
      e("div",{style:{fontFamily:"DM Mono,monospace",fontSize:".6rem",color:"var(--muted)",letterSpacing:".1em",textTransform:"uppercase",marginBottom:14}},
        "// Priority weights (0 = ignore · 10 = critical)"),
      CATS.map(cat=>{
        const ms=METRIC_DEFS.filter(m=>m.cat===cat);
        const t=ms[0]?.type||"data";
        return e("div",{key:cat,className:"weights-cat"},
          e("div",{className:"weights-cat-title"},
            cat,
            e("span",{className:"weight-type "+TYPE_BADGE[t]},TYPE_LABEL[t])
          ),
          ms.map(m=>e("div",{key:m.key,className:"weight-row"},
            e("span",{className:"weight-label"},m.label),
            e("input",{type:"range",min:0,max:10,value:weights[m.key]||0,
              onChange:ev=>onChange({...weights,[m.key]:+ev.target.value})}),
            e("span",{className:"weight-num"},weights[m.key]||0)
          ))
        );
      })
    ),
    e("div",{className:"preview-scroll"},
      ranked.length===0
        ?e("div",{className:"onboard-empty"},
          e("div",{className:"big"},"⚖️"),
          "Add cities in Step 1 first")
        :e("div",null,
          e("div",{className:"label",style:{marginBottom:12}},
            "Live preview — adjusts as you move sliders"),
          ranked.map((r,i)=>e("div",{key:r.name,style:{
            display:"flex",alignItems:"center",gap:10,padding:"10px 12px",
            background:"var(--surf)",border:"1px solid var(--border)",
            borderLeft:"3px solid "+(i===0?"var(--accent)":i===1?"var(--blue)":i===2?"var(--purple)":"var(--border)"),
            borderRadius:"var(--r)",marginBottom:8
          }},
            e("span",{style:{fontFamily:"DM Mono,monospace",fontSize:".65rem",color:i===0?"var(--accent)":i===1?"var(--blue)":i===2?"var(--purple)":"var(--muted)",width:22}},"#"+(i+1)),
            e("span",{style:{fontSize:16}},CITY_DB.find(c=>c.city===r.name)?.flag||"🏙️"),
            e("span",{style:{flex:1,fontWeight:600,fontSize:".9rem"}},r.name),
            e("div",{style:{flex:2,height:3,background:"var(--surf2)",borderRadius:2,overflow:"hidden"}},
              e("div",{style:{height:"100%",width:(r.total/((ranked[0]?.total)||100)*100)+"%",background:i===0?"var(--accent)":i===1?"var(--blue)":i===2?"var(--purple)":"#555",borderRadius:2}})
            ),
            e("span",{style:{fontFamily:"DM Mono,monospace",fontSize:".82rem",color:"var(--accent)",width:36,textAlign:"right"}},r.total.toFixed(1))
          ))
        )
    )
  );
}

// ── Step 3: Output — city cards ──────────────────────────────
function CityCard({name,rank,total,maxTotal,allScores,weights,liveData}){
  const[exp,setExp]=useState(false);
  const db=CITY_DB.find(c=>c.city===name)||{};
  const{scores,raws,isLive}=allScores;
  const barW=(total/(maxTotal||1)*100).toFixed(1);
  const rCls="city-result-card rank"+Math.min(rank,4);

  const ms=METRIC_DEFS.filter(m=>(weights[m.key]||0)>0);
  const top=[...ms].sort((a,b)=>(scores[b.key]||0)*(weights[b.key]||0)-(scores[a.key]||0)*(weights[a.key]||0)).slice(0,6);
  const show=exp?ms:top;

  return e("div",{className:rCls,onClick:()=>setExp(x=>!x)},
    e("div",{className:"card-header-row"},
      e("div",{className:"card-rank-num"},"#"+rank),
      e("span",{style:{fontSize:18,marginRight:2}},db.flag||"🏙️"),
      e("div",{className:"card-city-name"},name),
      e("div",{className:"card-total"},total.toFixed(1)),
      e("div",{className:"expand-arrow"},exp?"▲":"▼")
    ),
    e("div",{className:"bar-track"},e("div",{className:"bar-fill",style:{width:barW+"%"}})),
    e("div",{className:"metric-chips"},
      show.map(m=>{
        const v=scores[m.key]??0;
        const live=isLive[m.key];
        const calc=m.type==="dynamic";
        const cls="mchip"+(live?" live":calc?" calc":"")+(v>=7.5?" hi":v<3.5?" lo":"");
        const dotC=live?"var(--blue)":calc?"var(--purple)":"var(--orange)";
        return e("div",{key:m.key,className:cls},
          e("div",{className:"mchip-dot",style:{background:dotC}}),
          e("div",{className:"mchip-key"},m.label),
          e("div",{className:"mchip-val "+(v>=7.5?"hi":v<3.5?"lo":"")},v.toFixed(1)),
          raws[m.key]&&e("div",{className:"mchip-raw"},raws[m.key])
        );
      })
    )
  );
}

// ── Step 3: Summary ──────────────────────────────────────────
function SummaryPanel({ranked,allScoresMap,weights}){
  const barRef=useRef(null);
  const radarRef=useRef(null);
  const barChart=useRef(null);
  const radarChart=useRef(null);
  const CITY_COLORS=["#e8ff47","#47c4ff","#b47bff","#4dff91","#ffb347","#ff6b6b","#fff","#888"];

  useEffect(()=>{
    if(!barRef.current||!ranked.length)return;
    if(barChart.current)barChart.current.destroy();
    barChart.current=new Chart(barRef.current,{
      type:"bar",
      data:{
        labels:ranked.map(r=>{const db=CITY_DB.find(c=>c.city===r.name);return(db?.flag||"")+" "+r.name;}),
        datasets:[{data:ranked.map(r=>+r.total.toFixed(1)),backgroundColor:ranked.map((_,i)=>CITY_COLORS[i]||"#888"),borderRadius:4,borderSkipped:false}]
      },
      options:{indexAxis:"y",plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.parsed.x.toFixed(1)+"/100"}}},scales:{x:{min:0,max:100,grid:{color:"#22222e"},ticks:{color:"#55556a",font:{family:"DM Mono, monospace",size:10}}},y:{grid:{display:false},ticks:{color:"#b0b0c0",font:{family:"Syne, sans-serif",size:11}}}},animation:{duration:400}}
    });
  },[ranked.map(r=>r.total).join(",")]);

  useEffect(()=>{
    if(!radarRef.current||!ranked.length)return;
    if(radarChart.current)radarChart.current.destroy();
    const cats=CATS;
    const datasets=ranked.slice(0,4).map((r,i)=>{
      const scores=allScoresMap[r.name]?.scores||{};
      const data=cats.map(cat=>{
        const ms=METRIC_DEFS.filter(m=>m.cat===cat&&(weights[m.key]||0)>0);
        if(!ms.length)return 0;
        return +(ms.reduce((s,m)=>s+(scores[m.key]||0),0)/ms.length).toFixed(1);
      });
      const db=CITY_DB.find(c=>c.city===r.name);
      return{label:(db?.flag||"")+" "+r.name,data,borderColor:CITY_COLORS[i],backgroundColor:CITY_COLORS[i]+"18",pointBackgroundColor:CITY_COLORS[i],borderWidth:1.5};
    });
    radarChart.current=new Chart(radarRef.current,{
      type:"radar",
      data:{labels:cats.map(c=>c.replace(/^.+\s/,"")),datasets},
      options:{plugins:{legend:{position:"bottom",labels:{color:"#66668a",font:{family:"DM Mono, monospace",size:9},boxWidth:10,padding:8}}},scales:{r:{grid:{color:"#22222e"},ticks:{display:false},pointLabels:{color:"#66668a",font:{family:"DM Mono, monospace",size:9}},min:0,max:10}},animation:{duration:400}}
    });
  },[ranked.map(r=>r.name).join(","),JSON.stringify(weights)]);

  const winner=ranked[0];
  return e("div",null,
    winner&&e("div",{className:"winner-banner"},
      e("div",{className:"winner-flag"},CITY_DB.find(c=>c.city===winner.name)?.flag||"🏙️"),
      e("div",null,
        e("div",{className:"label",style:{marginBottom:4}},"Top recommendation"),
        e("div",{style:{display:"flex",alignItems:"baseline",gap:8}},
          e("div",{style:{fontSize:"1.3rem",fontWeight:800,letterSpacing:"-.02em"}},winner.name),
          e("div",{className:"winner-score"},winner.total.toFixed(1))
        )
      )
    ),
    e("div",{className:"grid2",style:{marginBottom:16}},
      e("div",{className:"card-sm"},
        e("div",{className:"label",style:{marginBottom:8}},"Overall Rankings"),
        e("canvas",{ref:barRef,height:160})
      ),
      e("div",{className:"card-sm"},
        e("div",{className:"label",style:{marginBottom:8}},"Category Radar (top 4)"),
        e("canvas",{ref:radarRef,height:160})
      )
    ),
    e("div",{className:"card-sm"},
      e("div",{className:"label",style:{marginBottom:10}},"Category Breakdown"),
      e("div",{style:{overflowX:"auto"}},
        e("table",{className:"summary-table"},
          e("thead",null,e("tr",null,
            e("th",null,"Category"),
            ...ranked.map(r=>e("th",{key:r.name},CITY_DB.find(c=>c.city===r.name)?.flag||"","",r.name))
          )),
          e("tbody",null,
            CATS.map(cat=>{
              const ms=METRIC_DEFS.filter(m=>m.cat===cat&&(weights[m.key]||0)>0);
              if(!ms.length)return null;
              const catS=ranked.map(r=>{const scores=allScoresMap[r.name]?.scores||{};return ms.reduce((s,m)=>s+(scores[m.key]||0),0)/ms.length;});
              const maxC=Math.max(...catS);
              return e("tr",{key:cat},
                e("td",{style:{color:"var(--dim)"}},cat),
                ...catS.map((s,i)=>e("td",{key:i},
                  e("div",{className:"mini-bar-wrap"},
                    e("div",{className:"mini-bar-bg"},
                      e("div",{className:"mini-bar-fill",style:{width:(s/maxC*100).toFixed(0)+"%",background:s===maxC?"var(--accent)":CITY_COLORS[i]||"#555"}})
                    ),
                    e("span",{style:{fontFamily:"DM Mono,monospace",fontSize:".7rem",color:s===maxC?"var(--accent)":"var(--text)",fontWeight:s===maxC?700:400}},s.toFixed(1))
                  )
                ))
              );
            }).filter(Boolean),
            e("tr",{style:{borderTop:"2px solid var(--border)"}},
              e("td",{style:{fontWeight:700,fontSize:".8rem"}},"TOTAL"),
              ...ranked.map((r,i)=>e("td",{key:i},
                e("span",{style:{fontFamily:"DM Mono,monospace",fontWeight:700,fontSize:".88rem",color:i===0?"var(--accent)":"var(--text)"}},r.total.toFixed(1))
              ))
            )
          )
        )
      )
    )
  );
}

// ── Step 3: Metrics detail ───────────────────────────────────
