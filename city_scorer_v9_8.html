<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relocation Scorer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b0b0f;--surf:#111118;--surf2:#181820;--border:#22222e;
  --accent:#e8ff47;--blue:#47c4ff;--purple:#b47bff;--green:#4dff91;--red:#ff6b6b;--orange:#ffb347;
  --text:#eff0f8;--dim:#a0a0c0;--muted:#55556a;
  --r:8px;--r2:12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(232,255,71,.04),transparent);}
#root{position:relative;z-index:1;min-height:100vh;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* ── Typography ── */
.mono{font-family:'DM Mono',monospace;}
.label{font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
h1{font-size:clamp(1.6rem,3.5vw,2.4rem);font-weight:800;letter-spacing:-.03em;line-height:1.1;}
h2{font-size:1.1rem;font-weight:700;letter-spacing:-.02em;}
h3{font-size:.85rem;font-weight:700;}

/* ── Layout ── */
.page{min-height:100vh;display:flex;flex-direction:column;}
.app-header{padding:20px 32px 0;border-bottom:1px solid var(--border);flex-shrink:0;}
.app-body{flex:1;overflow:hidden;}

/* ── Wizard steps ── */
.step-bar{display:flex;align-items:center;gap:0;margin-bottom:20px;}
.step-item{display:flex;align-items:center;gap:8px;padding:10px 16px;font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;}
.step-item.active{color:var(--accent);border-bottom-color:var(--accent);}
.step-item.done{color:var(--green);border-bottom-color:rgba(77,255,145,.4);}
.step-item.locked{pointer-events:none;}
.step-num{width:20px;height:20px;border-radius:50%;border:1px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:.6rem;flex-shrink:0;}
.step-item.done .step-num{background:var(--green);color:var(--bg);border-color:var(--green);}

/* ── Buttons ── */
.btn{padding:10px 20px;border-radius:var(--r);font-family:'Syne',sans-serif;font-weight:700;font-size:.8rem;cursor:pointer;border:none;transition:all .15s;display:inline-flex;align-items:center;gap:8px;}
.btn-primary{background:var(--accent);color:var(--bg);}
.btn-primary:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 20px rgba(232,255,71,.25);}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-ghost{background:transparent;color:var(--dim);border:1px solid var(--border);}
.btn-ghost:hover{border-color:var(--muted);color:var(--text);}
.btn-danger{background:rgba(255,107,107,.1);color:var(--red);border:1px solid rgba(255,107,107,.25);}
.btn-danger:hover{background:rgba(255,107,107,.2);}
.btn-sm{padding:5px 11px;font-size:.7rem;}
.btn-add{background:rgba(232,255,71,.08);color:var(--accent);border:1px solid rgba(232,255,71,.25);}
.btn-add:hover{background:rgba(232,255,71,.14);}

/* ── Inputs ── */
.input{background:var(--surf2);border:1px solid var(--border);border-radius:var(--r);padding:9px 12px;color:var(--text);font-family:'DM Mono',monospace;font-size:.78rem;outline:none;width:100%;transition:border-color .15s;}
.input:focus{border-color:rgba(232,255,71,.4);}
.input::placeholder{color:var(--muted);}
.input-group{display:flex;flex-direction:column;gap:5px;}
.input-label{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}

/* ── Autocomplete ── */
.autocomplete-wrap{position:relative;}
.ac-dropdown{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--surf2);border:1px solid var(--border);border-radius:var(--r);z-index:200;max-height:220px;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.6);overscroll-behavior:contain;}
.ac-item{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;font-size:.82rem;transition:background .1s;}
.ac-item:hover,.ac-item.selected{background:rgba(255,255,255,.06);}
.ac-flag{font-size:1.1rem;flex-shrink:0;}
.ac-main{flex:1;}
.ac-city{font-weight:600;}
.ac-country{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--muted);margin-top:1px;}
.ac-empty{padding:12px;font-family:'DM Mono',monospace;font-size:.72rem;color:var(--muted);text-align:center;}

/* ── Cards ── */
.card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r2);padding:20px;}
.card-sm{background:var(--surf2);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;}

/* ── Tags / pills ── */
.tag{display:inline-flex;align-items:center;gap:6px;font-family:'DM Mono',monospace;font-size:.65rem;padding:4px 10px;border-radius:20px;border:1px solid var(--border);color:var(--dim);}
.tag-y{border-color:rgba(232,255,71,.3);color:var(--accent);}
.tag-b{border-color:rgba(71,196,255,.3);color:var(--blue);}
.tag-g{border-color:rgba(77,255,145,.3);color:var(--green);}
.tag-remove{cursor:pointer;opacity:.6;margin-left:2px;font-size:.7rem;}
.tag-remove:hover{opacity:1;}

/* ── Pill status ── */
.pill{display:inline-flex;align-items:center;gap:5px;font-family:'DM Mono',monospace;font-size:.6rem;padding:2px 8px;border-radius:20px;border:1px solid var(--border);color:var(--muted);}
.pill-ok{border-color:rgba(77,255,145,.4);color:var(--green);}
.pill-err{border-color:rgba(255,107,107,.4);color:var(--red);}
.pill-busy{border-color:rgba(71,196,255,.4);color:var(--blue);}
.pill-dot{width:5px;height:5px;border-radius:50%;background:currentColor;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.blink{animation:blink 1s ease-in-out infinite;}

/* ── Slider ── */
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:3px;background:var(--border);border-radius:2px;outline:none;cursor:pointer;min-width:0;display:block;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent);cursor:pointer;box-shadow:0 0 6px rgba(232,255,71,.4);}

/* ── Grid ── */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}

/* ── Step 1: Setup ── */
.setup-layout{display:grid;grid-template-columns:1fr 1fr;gap:20px;padding:24px 32px;overflow-y:auto;height:calc(100vh - 108px);}
.setup-section-title{font-size:.65rem;font-family:'DM Mono',monospace;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;}

/* ── Step 2: Priorities ── */
.priorities-layout{display:grid;grid-template-columns:300px 1fr;height:calc(100vh - 108px);overflow:hidden;}
.weights-scroll{overflow-y:auto;padding:20px 16px;border-right:1px solid var(--border);}
.weights-cat{margin-bottom:18px;padding-bottom:18px;border-bottom:1px solid var(--border);}
.weights-cat:last-child{border-bottom:none;margin-bottom:0;}
.weights-cat-title{display:flex;align-items:center;gap:6px;font-size:.63rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#8888aa;margin-bottom:10px;}
.weight-type{font-family:'DM Mono',monospace;font-size:.5rem;padding:1px 6px;border-radius:3px;}
.wt-live{background:rgba(71,196,255,.1);color:var(--blue);border:1px solid rgba(71,196,255,.25);}
.wt-calc{background:rgba(180,123,255,.1);color:var(--purple);border:1px solid rgba(180,123,255,.25);}
.wt-data{background:rgba(255,179,71,.1);color:var(--orange);border:1px solid rgba(255,179,71,.25);}
.weight-row{display:flex;align-items:center;gap:6px;margin-bottom:8px;}
.weight-label{font-size:.72rem;color:var(--dim);flex:1;}
.weight-num{font-family:'DM Mono',monospace;font-size:.7rem;color:var(--accent);width:14px;text-align:right;flex-shrink:0;}
.preview-scroll{overflow-y:auto;padding:20px;}

/* ── Step 3: Output ── */
.output-layout{display:grid;grid-template-columns:1fr 1fr;gap:0;height:calc(100vh - 108px);overflow:hidden;}
.output-left{overflow-y:auto;padding:20px;border-right:1px solid var(--border);}
.output-right{overflow-y:auto;padding:20px;}
.output-tabs{display:flex;gap:0;margin-bottom:16px;border-bottom:1px solid var(--border);}
.ot{font-family:'DM Mono',monospace;font-size:.65rem;padding:8px 14px;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;transition:all .15s;text-transform:uppercase;letter-spacing:.05em;}
.ot.active{color:var(--accent);border-bottom-color:var(--accent);}

/* ── City card (results) ── */
.city-result-card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r2);padding:16px;margin-bottom:10px;cursor:pointer;position:relative;overflow:hidden;transition:border-color .2s;}
.city-result-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--border);transition:background .3s;}
.city-result-card.rank1::before{background:var(--accent);box-shadow:0 0 10px rgba(232,255,71,.4);}
.city-result-card.rank2::before{background:var(--blue);}
.city-result-card.rank3::before{background:var(--purple);}
.card-header-row{display:flex;align-items:center;gap:10px;margin-bottom:9px;}
.card-rank-num{font-family:'DM Mono',monospace;font-size:.68rem;color:var(--muted);width:22px;}
.rank1 .card-rank-num{color:var(--accent);}
.rank2 .card-rank-num{color:var(--blue);}
.rank3 .card-rank-num{color:var(--purple);}
.card-city-name{font-size:.98rem;font-weight:700;flex:1;}
.card-total{font-family:'DM Mono',monospace;font-size:1.1rem;font-weight:500;color:var(--accent);}
.expand-arrow{color:var(--muted);font-size:.75rem;}
.bar-track{height:3px;background:var(--surf2);border-radius:2px;margin-bottom:12px;overflow:hidden;}
.bar-fill{height:100%;border-radius:2px;transition:width .6s cubic-bezier(.34,1.2,.64,1);}
.rank1 .bar-fill{background:linear-gradient(90deg,var(--accent),#c8ef00);}
.rank2 .bar-fill{background:linear-gradient(90deg,var(--blue),#80dfff);}
.rank3 .bar-fill{background:linear-gradient(90deg,var(--purple),#d0a0ff);}
.city-result-card:not(.rank1):not(.rank2):not(.rank3) .bar-fill{background:#444;}
.metric-chips{display:grid;grid-template-columns:repeat(auto-fill,minmax(105px,1fr));gap:5px;}
.mchip{background:var(--surf2);border:1px solid var(--border);border-radius:5px;padding:4px 7px;position:relative;min-width:0;}
.mchip-dot{position:absolute;top:3px;right:4px;width:4px;height:4px;border-radius:50%;}
.mchip.live{border-color:rgba(71,196,255,.22);}
.mchip.calc{border-color:rgba(180,123,255,.22);}
.mchip.hi{border-color:rgba(77,255,145,.28);}
.mchip.lo{border-color:rgba(255,107,107,.28);}
.mchip-key{font-family:'DM Mono',monospace;font-size:.53rem;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.mchip-val{font-size:.82rem;font-weight:700;}
.mchip-val.hi{color:var(--green);}
.mchip-val.lo{color:var(--red);}
.mchip-raw{font-family:'DM Mono',monospace;font-size:.52rem;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.legend-row{display:flex;flex-wrap:wrap;gap:12px;margin-top:10px;font-family:'DM Mono',monospace;font-size:.6rem;color:var(--muted);}
.legend-item{display:flex;align-items:center;gap:4px;}
.ldot{width:6px;height:6px;border-radius:50%;}

/* ── Summary/charts ── */
.winner-banner{background:linear-gradient(135deg,rgba(232,255,71,.07),rgba(71,196,255,.04));border:1px solid rgba(232,255,71,.25);border-radius:var(--r2);padding:16px 20px;margin-bottom:16px;display:flex;align-items:center;gap:14px;}
.winner-flag{font-size:42px;line-height:1;}
.winner-score{font-family:'DM Mono',monospace;font-size:1.4rem;font-weight:500;color:var(--accent);}
.summary-table{width:100%;border-collapse:collapse;font-size:.76rem;}
.summary-table th{font-family:'DM Mono',monospace;font-size:.57rem;color:var(--muted);padding:6px 9px;text-align:left;border-bottom:1px solid var(--border);font-weight:400;}
.summary-table th:not(:first-child){text-align:right;}
.summary-table td{padding:7px 9px;border-bottom:1px solid rgba(34,34,46,.5);vertical-align:middle;}
.summary-table td:not(:first-child){text-align:right;}
.summary-table tr:hover td{background:rgba(255,255,255,.02);}
.mini-bar-wrap{display:flex;align-items:center;gap:5px;justify-content:flex-end;}
.mini-bar-bg{width:40px;height:3px;background:var(--surf2);border-radius:2px;overflow:hidden;}
.mini-bar-fill{height:100%;border-radius:2px;}

/* ── Metrics detail ── */
.metric-list-wrap{display:grid;grid-template-columns:190px 1fr;height:100%;overflow:hidden;}
.metric-list-inner{overflow-y:auto;padding:12px 8px;border-right:1px solid var(--border);}
.ml-cat{font-family:'DM Mono',monospace;font-size:.55rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin:10px 4px 5px;padding-bottom:3px;border-bottom:1px solid var(--border);}
.ml-item{display:flex;align-items:center;gap:7px;padding:6px 8px;border-radius:4px;cursor:pointer;font-size:.73rem;color:var(--muted);transition:all .1s;margin-bottom:2px;}
.ml-item:hover,.ml-item.active{background:var(--surf2);color:var(--text);border:1px solid var(--border);}
.ml-item:not(.active):not(:hover){border:1px solid transparent;}
.metric-detail-inner{overflow-y:auto;padding:20px 22px;}
.detail-source-link{font-family:'DM Mono',monospace;font-size:.63rem;color:var(--blue);text-decoration:none;border-bottom:1px solid rgba(71,196,255,.3);}
.logic-box{background:rgba(232,255,71,.04);border:1px solid rgba(232,255,71,.15);border-radius:var(--r);padding:11px 13px;margin:12px 0;}
.formula-box{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:11px 13px;margin:12px 0;}
.box-label{font-family:'DM Mono',monospace;font-size:.56rem;text-transform:uppercase;letter-spacing:.08em;color:var(--accent);margin-bottom:5px;}
.formula-box .box-label{color:var(--muted);}
.logic-box p{font-size:.76rem;color:var(--dim);line-height:1.65;}
.formula-box pre{font-family:'DM Mono',monospace;font-size:.7rem;color:var(--blue);white-space:pre-wrap;line-height:1.65;margin:0;}
.metric-score-table{width:100%;border-collapse:collapse;font-size:.76rem;}
.metric-score-table th{font-family:'DM Mono',monospace;font-size:.56rem;color:var(--muted);padding:5px 8px;border-bottom:1px solid var(--border);font-weight:400;text-align:left;}
.metric-score-table td{padding:7px 8px;border-bottom:1px solid rgba(34,34,46,.5);}
.score-bar-wrap{display:flex;align-items:center;gap:7px;}
.score-bar-bg{flex:1;max-width:90px;height:4px;background:var(--surf2);border-radius:2px;overflow:hidden;}
.score-bar-fill{height:100%;background:var(--accent);border-radius:2px;}
.score-num{font-family:'DM Mono',monospace;font-size:.7rem;width:26px;text-align:right;}
.score-num.hi{color:var(--green);}
.score-num.lo{color:var(--red);}

/* ── Empty/onboarding ── */
.onboard-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;color:var(--muted);font-family:'DM Mono',monospace;font-size:.78rem;text-align:center;padding:40px;}
.onboard-empty .big{font-size:3rem;opacity:.4;}

/* ── Status bar ── */
.status-bar{display:flex;gap:5px;flex-wrap:wrap;padding:7px 32px;border-bottom:1px solid var(--border);min-height:34px;align-items:center;background:rgba(17,17,24,.8);}

/* ── Fetch button ── */
.fetch-btn{background:var(--accent);color:var(--bg);border:none;padding:9px 18px;font-family:'Syne',sans-serif;font-weight:700;font-size:.78rem;cursor:pointer;border-radius:var(--r);display:flex;align-items:center;gap:7px;transition:all .15s;white-space:nowrap;}
.fetch-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 6px 20px rgba(232,255,71,.25);}
.fetch-btn:disabled{opacity:.4;cursor:not-allowed;}

/* ── Responsive ── */
@media(max-width:760px){
  .setup-layout,.priorities-layout,.output-layout,.grid2,.metric-list-wrap{grid-template-columns:1fr;}
  .weights-scroll{border-right:none;border-bottom:1px solid var(--border);height:auto;}
  .output-left,.output-right,.preview-scroll{height:auto;}
  .output-layout{height:auto;}
  .app-header{padding:14px 16px 0;}
  .setup-layout,.priorities-layout{padding:16px;height:auto;}
  .output-left,.output-right{padding:14px;}
}
</style>
</head>
<body>
<div id="root"></div>
<script>

const clamp=(v,lo=0,hi=10)=>Math.max(lo,Math.min(hi,v));
const haversineKm=(lat1,lon1,lat2,lon2)=>{
  const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
};

const scoreAirQuality=pm25=>clamp(10-(pm25-5)*(10/30));
const scoreCarFree=pct=>clamp(pct/7.3);
const scoreComfortDays=(temps,min=10,max=25)=>{
  const days=temps.reduce((s,t)=>{
    if(t>=min&&t<=max)return s+1;
    if(t>max&&t<=max+3)return s+(max+3-t)/3;
    if(t>=min-3&&t<min)return s+(t-(min-3))/3;
    return s;
  },0);
  return{score:clamp((days-150)/9),raw:Math.round(days)+" days/yr"};
};
const scoreSunshine=rads=>{
  const h=rads.reduce((a,b)=>a+b,0)*0.6;
  return{score:clamp((h-1200)/230),raw:Math.round(h)+"h/yr"};
};
const scoreRent=usd=>clamp(10-(usd-500)/400);
const scoreSafety=idx=>clamp(idx/10);
const scoreHealthcare=idx=>clamp(idx/10);
const scoreInternet=mbps=>clamp((mbps-50)/15);
const scoreLang=(efEpi,userLangs,localLang)=>{
  const base=clamp((efEpi-400)/30);
  const speaks=userLangs.some(l=>l.toLowerCase()===localLang?.toLowerCase()||
    (["english"].includes(l.toLowerCase())&&["English"].includes(localLang)));
  return clamp(speaks?base+3:base);
};
const scoreVisa=(passports,country,rights)=>{
  let best={score:3,label:"No passport data — assumed difficult"};
  for(const p of passports){
    const r=rights[p]||{};
    const e=r[country]||r["EU"]||r["European"];
    if(e&&e.score>best.score)best=e;
  }
  return best;
};
const scoreFamily=(lat,lon,anchors)=>{
  if(!anchors.length)return{score:5,raw:"No anchors set"};
  const total=anchors.reduce((s,a)=>s+a.weight,0)||1;
  const sc=anchors.reduce((sum,a)=>{
    const km=haversineKm(lat,lon,a.lat,a.lon);
    return sum+(a.weight/total)*Math.max(1,10-(km/10000)*9);
  },0);
  const details=anchors.map(a=>{
    const km=Math.round(haversineKm(lat,lon,a.lat,a.lon));
    return `${a.label}: ${km}km`;
  }).join(" | ");
  return{score:clamp(sc),raw:details};
};
const scoreProximity=(lat,lon,anchors)=>{
  if(!anchors.length)return{score:5,raw:"No people added"};
  const total=anchors.reduce((s,a)=>s+a.weight,0)||1;
  const sc=anchors.reduce((sum,a)=>{
    const km=haversineKm(lat,lon,a.lat,a.lon);
    return sum+(a.weight/total)*Math.max(1,10-(km/6500)*9);
  },0);
  const details=anchors.map(a=>`${a.label}: ${Math.round(haversineKm(lat,lon,a.lat,a.lon))}km`).join(" | ");
  return{score:clamp(sc),raw:details};
};
const scoreTravel=(conn,cost)=>clamp((conn+cost)/2);
const scoreBeauty=pct=>clamp((pct-65)/(84-65)*10);

const scoreCityTotal=(scores,weights)=>{
  const keys=Object.keys(weights);
  let t=0,mx=0;
  for(const k of keys){t+=(scores[k]??0)*(weights[k]??0);mx+=10*(weights[k]??0);}
  return mx>0?(t/mx)*100:0;
};

function buildScores(cityName,cityDb,config,liveData){
  const db=CITY_DB.find(c=>c.city===cityName)||{};
  const s=CITY_STATIC[cityName]||{};
  const nb=NUMBEO_FB[cityName]||{};
  const live=liveData[cityName]||{};
  const country=db.country||"";

  const airQ=live.airQ??scoreAirQuality(nb.rentUSD?11:11);
  const tempS=live.temp??5;
  const sunS=live.sun??clamp((s.staticSunH-1200)/230);
  const rentS=live.rent??scoreRent(nb.rentUSD||1500);
  const safetyS=live.safety??scoreSafety(nb.safetyIdx||50);
  const healthS=live.healthcare??scoreHealthcare(nb.healthcareIdx||65);
  const carFreeS=scoreCarFree(s.carFreePct||50);
  const noWar=s.noWar??10;
  const bureau=s.bureau??5;
  const travelS=scoreTravel(s.travelConn||7,s.travelCost||7);
  const beauty=scoreBeauty(s.beautyGR||70);
  const internet=scoreInternet(s.internetMbps||100);
  const social=clamp(s.socialScore||6);
  const visaRes=scoreVisa(config.passports,country,PASSPORT_RIGHTS);
  const famRes=scoreFamily(db.lat,db.lon,config.familyAnchors);
  const proxRes=scoreProximity(db.lat,db.lon,config.proximityAnchors);
  const efEpi=EF_EPI[country]||500;
  const langS=scoreLang(efEpi,config.languages,LOCAL_LANG[country]);

  return{
    scores:{airQ,carFree:carFreeS,temp:tempS,sun:sunS,rent:rentS,safety:safetyS,
      noWar,visa:visaRes.score,bureau,family:famRes.score,proximity:proxRes.score,
      travel:travelS,lang:langS,beauty,healthcare:healthS,internet,social},
    raws:{
      airQ:live.airQRaw||(nb.rentUSD?"~est":"~11 µg/m³"),
      temp:live.tempRaw||"(static est.)",sun:live.sunRaw||(s.staticSunH+"h/yr static"),
      rent:live.rentRaw||("~$"+nb.rentUSD+"/mo est."),
      safety:live.safetyRaw||(nb.safetyIdx+"/100 est."),
      healthcare:live.healthcareRaw||(nb.healthcareIdx+"/100 est."),
      carFree:s.carFreePct+"%",noWar:noWar===0?"⚠️ Active conflict":"Peaceful",
      visa:visaRes.label,bureau:bureau>=9?"Citizen":"See Metrics tab",
      family:famRes.raw,proximity:proxRes.raw,
      lang:"EF EPI "+(EF_EPI[country]||"?"),
      beauty:s.beautyGR+"% golden ratio",internet:s.internetMbps+" Mbps",
      social:s.socialScore+"/10",travel:"Conn:"+s.travelConn+" Cost:"+s.travelCost,
    },
    isLive:{airQ:!!live.airQ,temp:!!live.temp,sun:!!live.sun,
      rent:!!live.rent,safety:!!live.safety,healthcare:!!live.healthcare},
  };
}

const{createElement:h,useState,useEffect,useCallback,useMemo,useRef}=React;

// ── CityAutocomplete ─────────────────────────────────────────
function CityAutocomplete({value,onChange,onSelect,placeholder="Type a city…",excludeIds=[],_inputRef}){
  const[open,setOpen]=useState(false);
  const[sel,setSel]=useState(-1);
  const ref=useRef(null);
  const filtered=useMemo(()=>{
    if(!value||value.length<1)return[];
    const q=value.toLowerCase();
    return CITY_DB
      .filter(c=>!excludeIds.includes(c.city+"|"+c.country))
      .filter(c=>c.city.toLowerCase().includes(q)||c.country.toLowerCase().includes(q))
      .slice(0,8);
  },[value,excludeIds]);

  useEffect(()=>{
    const handler=ev=>{if(ref.current&&!ref.current.contains(ev.target))setOpen(false);};
    document.addEventListener("mousedown",handler);
    return()=>document.removeEventListener("mousedown",handler);
  },[]);

  return e("div",{className:"autocomplete-wrap",ref},
    e("input",{className:"input",value,placeholder,ref:_inputRef,
      onChange:ev=>{onChange(ev.target.value);setOpen(true);setSel(-1);},
      onFocus:()=>{if(filtered.length)setOpen(true);},
      onKeyDown:ev=>{
        if(ev.key==="ArrowDown"){ev.preventDefault();setSel(s=>Math.min(s+1,filtered.length-1));}
        else if(ev.key==="ArrowUp"){ev.preventDefault();setSel(s=>Math.max(s-1,0));}
        else if(ev.key==="Enter"&&sel>=0&&filtered[sel]){ev.preventDefault();onSelect(filtered[sel]);setOpen(false);}
        else if(ev.key==="Escape")setOpen(false);
        else if(ev.key==="Tab")setOpen(false);
      }
    }),
    open&&filtered.length>0&&e("div",{className:"ac-dropdown"},
      filtered.map((c,i)=>e("div",{
        key:c.city+c.country,
        className:"ac-item"+(i===sel?" selected":""),
        onMouseDown:()=>{onSelect(c);setOpen(false);},
        onMouseEnter:()=>setSel(i),
      },
        e("span",{className:"ac-flag"},c.flag),
        e("div",{className:"ac-main"},
          e("div",{className:"ac-city"},c.city),
          e("div",{className:"ac-country"},c.country),

      ))
    ),
    open&&value.length>=1&&filtered.length===0&&
      e("div",{className:"ac-dropdown"},e("div",{className:"ac-empty"},"No cities found for \""+value+"\""))
  );
}

// ── PassportSelect ───────────────────────────────────────────
function PassportSelect({passports,onChange}){
  const[input,setInput]=useState("");
  const[open,setOpen]=useState(false);
  const[selIdx,setSelIdx]=useState(-1);
  const ref=useRef(null);
  const dropRef=useRef(null);
  const filtered=useMemo(()=>{
    const q=input.toLowerCase();
    return ALL_PASSPORTS.filter(p=>p.toLowerCase().includes(q)&&!passports.includes(p));
  },[input,passports]);
  useEffect(()=>{
    const h=ev=>{if(ref.current&&!ref.current.contains(ev.target))setOpen(false);};
    document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h);
  },[]);
  // Scroll selected item into view
  useEffect(()=>{
    if(selIdx<0||!dropRef.current)return;
    const item=dropRef.current.children[selIdx];
    if(item)item.scrollIntoView({block:"nearest"});
  },[selIdx]);
  const add=p=>{onChange([...passports,p]);setInput("");setOpen(false);setSelIdx(-1);};
  return e("div",null,
    e("div",{className:"autocomplete-wrap",ref},
      e("input",{className:"input",value:input,placeholder:"Search passport nationality…",
        onChange:ev=>{setInput(ev.target.value);setOpen(true);setSelIdx(-1);},
        onFocus:()=>{setOpen(true);setSelIdx(-1);},
        onKeyDown:ev=>{
          if(!open)return;
          if(ev.key==="ArrowDown"){ev.preventDefault();setSelIdx(s=>Math.min(s+1,filtered.length-1));}
          else if(ev.key==="ArrowUp"){ev.preventDefault();setSelIdx(s=>Math.max(s-1,0));}
          else if(ev.key==="Enter"&&selIdx>=0&&filtered[selIdx]){ev.preventDefault();add(filtered[selIdx]);}
          else if(ev.key==="Escape"){setOpen(false);setSelIdx(-1);}
          else if(ev.key==="Tab"){setOpen(false);}
        },
      }),
      open&&filtered.length>0&&e("div",{className:"ac-dropdown",ref:dropRef},
        filtered.map((p,i)=>e("div",{
          key:p,className:"ac-item"+(i===selIdx?" selected":""),
          onMouseDown:ev=>{ev.preventDefault();add(p);},
          onMouseEnter:()=>setSelIdx(i),
        },e("div",{className:"ac-main"},e("div",{className:"ac-city"},p))))
      ),
      open&&filtered.length===0&&input.length>0&&
        e("div",{className:"ac-dropdown"},e("div",{className:"ac-empty"},"No match for \""+input+"\""))
    ),
    e(TagList,{items:passports,onRemove:i=>onChange(passports.filter((_,j)=>j!==i)),
      colorClass:"tag-y",renderItem:p=>e("span",null,"🛂 ",p)}),
  );
}

// Each anchor has an independent weight (number input, 1–100).
// Weights are NOT linked — changing one does not affect others.
// The total is validated and must equal 100% before proceeding.

function AnchorEditor({anchors,onChange}){
  const[cityInput,setCityInput]=useState("");
  const[label,setLabel]=useState("");
  const[newType,setNewType]=useState("family");
  const labelRef=useRef(null);
  const cityInputRef=useRef(null);

  const addAnchor=city=>{
    const lbl=label.trim()||city.city;
    // Default weight: 100 if first, else 0 (user must set it themselves)
    const defaultW=anchors.length===0?100:0;
    onChange([...anchors,{label:lbl,type:newType,city:city.city,country:city.country,flag:city.flag,lat:city.lat,lon:city.lon,weight:defaultW}]);
    setCityInput("");
    setLabel("");
    setTimeout(()=>labelRef.current&&labelRef.current.focus(),50);
  };

  const setWeight=(i,raw)=>{
    const v=Math.max(0,Math.min(100,parseInt(raw)||0));
    const updated=[...anchors];
    updated[i]={...updated[i],weight:v};
    onChange(updated);
  };

  const removeAnchor=i=>onChange(anchors.filter((_,j)=>j!==i));

  const toggleType=i=>{
    const updated=[...anchors];
    updated[i]={...updated[i],type:updated[i].type==="family"?"people":"family"};
    onChange(updated);
  };

  const total=anchors.reduce((s,a)=>s+a.weight,0);
  const isOk=anchors.length===0||total===100;
  const familyCount=anchors.filter(a=>a.type==="family").length;
  const peopleCount=anchors.filter(a=>a.type==="people").length;

  return e("div",null,
    // Add form
    e("div",{style:{display:"grid",gridTemplateColumns:"1fr auto 1.3fr",gap:8,marginBottom:6,alignItems:"start"}},
      e("div",{className:"input-group"},
        e("div",{className:"input-label"},"Label"),
        e("input",{
          className:"input",ref:labelRef,value:label,
          placeholder:"e.g. Parents, Alex…",
          onChange:ev=>setLabel(ev.target.value),
          onKeyDown:ev=>{if(ev.key==="Tab"){ev.preventDefault();cityInputRef.current&&cityInputRef.current.focus();}},
        })
      ),
      e("div",{className:"input-group"},
        e("div",{className:"input-label"},"Type"),
        e("div",{style:{display:"flex"}},
          e("button",{
            style:{padding:"7px 10px",fontFamily:"DM Mono,monospace",fontSize:".6rem",cursor:"pointer",border:"1px solid "+(newType==="family"?"rgba(71,196,255,.4)":"var(--border)"),background:newType==="family"?"rgba(71,196,255,.1)":"transparent",color:newType==="family"?"var(--blue)":"var(--muted)",borderRadius:"var(--r) 0 0 var(--r)"},
            onMouseDown:ev=>{ev.preventDefault();setNewType("family");}
          },"👨‍👩‍👧"),
          e("button",{
            style:{padding:"7px 10px",fontFamily:"DM Mono,monospace",fontSize:".6rem",cursor:"pointer",border:"1px solid "+(newType==="people"?"rgba(180,123,255,.4)":"var(--border)"),borderLeft:"none",background:newType==="people"?"rgba(180,123,255,.1)":"transparent",color:newType==="people"?"var(--purple)":"var(--muted)",borderRadius:"0 var(--r) var(--r) 0"},
            onMouseDown:ev=>{ev.preventDefault();setNewType("people");}
          },"👤")
        )
      ),
      e("div",{className:"input-group"},
        e("div",{className:"input-label"},"City"),
        e(CityAutocomplete,{value:cityInput,onChange:setCityInput,placeholder:"Search city…",onSelect:addAnchor,_inputRef:cityInputRef})
      )
    ),
    e("div",{style:{fontFamily:"DM Mono,monospace",fontSize:".6rem",color:"var(--muted)",marginBottom:12}},
      "👨‍👩‍👧 family score · 👤 friends score · Tab label→city · Enter to add"),

    anchors.length===0&&e("div",{style:{fontFamily:"DM Mono,monospace",fontSize:".68rem",color:"var(--border)",padding:"14px 0",textAlign:"center",borderTop:"1px dashed var(--border)"}},"No anchors yet"),

    anchors.length>0&&e("div",null,
      // Anchor rows
      e("div",{style:{borderTop:"1px solid var(--border)",paddingTop:8,marginBottom:10}},
        anchors.map((a,i)=>e("div",{
          key:i,
          style:{display:"flex",alignItems:"center",gap:8,padding:"7px 0",borderBottom:"1px solid rgba(34,34,46,.5)"}
        },
          // Type toggle
          e("button",{
            title:"Toggle type",
            style:{fontSize:13,background:"transparent",border:"1px solid var(--border)",borderRadius:4,cursor:"pointer",padding:"2px 5px",flexShrink:0},
            onClick:()=>toggleType(i)
          },a.type==="family"?"👨‍👩‍👧":"👤"),
          // Flag + name
          e("span",{style:{fontSize:15,flexShrink:0}},a.flag),
          e("div",{style:{flex:1,minWidth:0}},

            e("div",{style:{fontFamily:"DM Mono,monospace",fontSize:".6rem",color:"var(--muted)"}},a.city,", ",a.country)

              type:"number",min:0,max:100,

                width:58,textAlign:"right",padding:"5px 8px",

              },

            e("span",{style:{fontFamily:"DM Mono,monospace",fontSize:".72rem",color:"var(--muted)"}},"%")

            border:"1px solid "+(isOk?"rgba(77,255,145,.3)":"rgba(255,107,107,.3)"),
            borderRadius:20,padding:"3px 12px",
          }},total+"%"+(isOk?" ✓":" — must equal 100%"))
        )
      )
    )
  );
}

// ── API fetchers ─────────────────────────────────────────────
async function fetchWeather(city,comfortMin,comfortMax){
  const url="https://climate-api.open-meteo.com/v1/climate?latitude="+city.lat+"&longitude="+city.lon+"&start_date=2010-01-01&end_date=2010-12-31&models=EC_Earth3P_HR&daily=temperature_2m_mean,shortwave_radiation_sum";
  const r=await fetch(url);if(!r.ok)throw new Error("HTTP "+r.status);
  const d=await r.json();if(d.error)throw new Error(d.reason||"API error");
  const temps=(d.daily?.temperature_2m_mean||[]).filter(v=>v!=null);
  const rads=(d.daily?.shortwave_radiation_sum||[]).filter(v=>v!=null);
  if(!temps.length)throw new Error("no temp data");
  const{score:tempScore,raw:tempRaw}=scoreComfortDays(temps,comfortMin,comfortMax);
  const{score:sunScore,raw:sunRaw}=scoreSunshine(rads.length?rads:[city.staticSunH||2000/0.6]);
  return{temp:tempScore,tempRaw,sun:sunScore,sunRaw};
}
async function fetchAir(city){
  const end=new Date();end.setDate(end.getDate()-1);
  const start=new Date(end);start.setFullYear(start.getFullYear()-1);
  const fmt=d=>d.toISOString().slice(0,10);
  const url="https://air-quality-api.open-meteo.com/v1/air-quality?latitude="+city.lat+"&longitude="+city.lon+"&hourly=pm2_5&start_date="+fmt(start)+"&end_date="+fmt(end)+"&timezone=UTC";
  const r=await fetch(url);if(!r.ok)throw new Error("HTTP "+r.status);
  const d=await r.json();if(d.error)throw new Error(d.reason||"API error");
  const vals=(d.hourly?.pm2_5||[]).filter(v=>v!=null&&v>=0&&v<500);
  if(!vals.length)throw new Error("no PM2.5 data");
  const mean=vals.reduce((a,b)=>a+b,0)/vals.length;
  return{airQ:scoreAirQuality(mean),airQRaw:mean.toFixed(1)+" µg/m³"};
}
async function fetchNumbeoCity(slug,path){
  const url="https://corsproxy.io/?"+encodeURIComponent("https://www.numbeo.com/"+path+"/in/"+slug);
  const r=await fetch(url);if(!r.ok)throw new Error("proxy "+r.status);
  return r.text();
}
async function fetchNumbeo(city){
  const slug=CITY_DB.find(c=>c.city===city.city)?.numbeo||city.city.replace(/\s/g,"-");
  const res={};
  try{
    const h=await fetchNumbeoCity(slug,"cost-of-living");
    const m=h.match(/Apartment \(1 bedroom\) in City Centre[^<]*<\/td>\s*<td[^>]*>\s*([\d,.]+)/s);
    if(m){const v=parseFloat(m[1].replace(/,/g,""));res.rent=scoreRent(v);res.rentRaw="$"+Math.round(v)+"/mo";}
  }catch{}
  await new Promise(r=>setTimeout(r,250));
  try{
    const h=await fetchNumbeoCity(slug,"crime");
    const m=h.match(/Safety Index.*?<td[^>]*>\s*([\d.]+)/s);
    if(m){const v=parseFloat(m[1]);res.safety=scoreSafety(v);res.safetyRaw=v.toFixed(1)+"/100";}
  }catch{}
  await new Promise(r=>setTimeout(r,250));
  try{
    const h=await fetchNumbeoCity(slug,"health-care");
    const m=h.match(/Health Care Index.*?<td[^>]*>\s*([\d.]+)/s);
    if(m){const v=parseFloat(m[1]);res.healthcare=scoreHealthcare(v);res.healthcareRaw=v.toFixed(1)+"/100";}
  }catch{}
  return res;
}

// ── Step 3: Output — city cards ──────────────────────────────
function CityCard({name,rank,total,maxTotal,allScores,weights,liveData}){
  const[exp,setExp]=useState(false);
  const db=CITY_DB.find(c=>c.city===name)||{};
  const{scores,raws,isLive}=allScores;
  const barW=(total/(maxTotal||1)*100).toFixed(1);
  const rCls="city-result-card rank"+Math.min(rank,4);

  const ms=METRIC_DEFS.filter(m=>(weights[m.key]||0)>0);
  const top=[...ms].sort((a,b)=>(scores[b.key]||0)*(weights[b.key]||0)-(scores[a.key]||0)*(weights[a.key]||0)).slice(0,6);
  const show=exp?ms:top;

  return e("div",{className:rCls,onClick:()=>setExp(x=>!x)},
    e("div",{className:"card-header-row"},
      e("div",{className:"card-rank-num"},"#"+rank),
      e("span",{style:{fontSize:18,marginRight:2}},db.flag||"🏙️"),
      e("div",{className:"card-city-name"},name),
      e("div",{className:"card-total"},total.toFixed(1)),
      e("div",{className:"expand-arrow"},exp?"▲":"▼")
    ),
    e("div",{className:"bar-track"},e("div",{className:"bar-fill",style:{width:barW+"%"}})),

}

        e("div",{className:"label",style:{marginBottom:8}},"Category Radar (top 4)"),
        e("canvas",{ref:radarRef,height:160})

      e("div",{style:{overflowX:"auto"}},
        e("table",{className:"summary-table"},
          e("thead",null,e("tr",null,

            CATS.map(cat=>{

              if(!ms.length)return null;

// ── Explanations panel ───────────────────────────────────────
function ExplanationsPanel({ranked,allScoresMap,weights,setup}){
  const winner=ranked[0];

  const cityNarrative=(r,rank)=>{
    const s=allScoresMap[r.name]?.scores||{};
    const db=CITY_DB.find(c=>c.city===r.name)||{};
    const strengths=METRIC_DEFS
      .filter(m=>(weights[m.key]||0)>0&&(s[m.key]||0)>=7.5)

        e("span",{style:{fontSize:18}},db.flag||"🏙️"),
        e("span",{style:{fontWeight:700,fontSize:"1rem",flex:1}},r.name),
        e("span",{style:{fontFamily:"DM Mono,monospace",fontSize:".9rem",color}},r.total.toFixed(1)+"/100")
      ),
      strengths.length>0&&e("div",{style:{marginBottom:8}},
        e("div",{style:{fontFamily:"DM Mono,monospace",fontSize:".57rem",color:"var(--green)",letterSpacing:".08em",textTransform:"uppercase",marginBottom:5}},"✓ Strengths"),
        e("div",{style:{display:"flex",flexWrap:"wrap",gap:5}},
          strengths.map(m=>e("span",{key:m.key,style:{fontFamily:"DM Mono,monospace",fontSize:".65rem",padding:"2px 8px",borderRadius:20,background:"rgba(77,255,145,.1)",border:"1px solid rgba(77,255,145,.2)",color:"var(--green)"}},m.label+" ",(s[m.key]||0).toFixed(1)))
        )
      ),
      weaknesses.length>0&&e("div",null,
        e("div",{style:{fontFamily:"DM Mono,monospace",fontSize:".57rem",color:"var(--red)",letterSpacing:".08em",textTransform:"uppercase",marginBottom:5}},"✗ Challenges"),
        e("div",{style:{display:"flex",flexWrap:"wrap",gap:5}},
          weaknesses.map(m=>e("span",{key:m.key,style:{fontFamily:"DM Mono,monospace",fontSize:".65rem",padding:"2px 8px",borderRadius:20,background:"rgba(255,107,107,.1)",border:"1px solid rgba(255,107,107,.2)",color:"var(--red)"}},m.label+" ",(s[m.key]||0).toFixed(1)))
        )
      ),
      strengths.length===0&&weaknesses.length===0&&e("div",{style:{fontFamily:"DM Mono,monospace",fontSize:".68rem",color:"var(--muted)"}},"No metrics with weight > 0 scoring at extremes.")

  return e("div",null,

    e("div",{style:{background:"var(--surf)",border:"1px solid var(--border)",borderRadius:"var(--r2)",padding:16,marginBottom:16}},
      e("h3",{style:{marginBottom:8}},"How the scoring works"),
      e("div",{style:{fontFamily:"DM Mono,monospace",fontSize:".72rem",color:"var(--dim)",lineHeight:1.7}},
        "Each city is scored on 17 metrics grouped into 8 categories. Every metric is normalized to 0–10 using real data sources (Open-Meteo, Numbeo, EF EPI, etc.). Your priority weights (set in Step 2) multiply each score — a metric you set to 0 is ignored entirely, one set to 10 has maximum influence.",

        e("br",null),e("br",null),
        "Dynamic metrics (visa, family proximity, language) are re-computed live whenever your setup changes. Live API metrics (weather, air quality, Numbeo) are fetched on demand and cached in your browser."
      )
    ),
    // Per-city narratives
    e("div",{style:{fontFamily:"DM Mono,monospace",fontSize:".6rem",color:"var(--muted)",letterSpacing:".08em",textTransform:"uppercase",marginBottom:10}},"Per-city analysis"),

  );
}

// ── Sensitivity panel ─────────────────────────────────────────
function SensitivityPanel({ranked,allScoresMap,weights}){
  const[hoverKey,setHoverKey]=useState(null);
  const CITY_COLORS=["var(--accent)","var(--blue)","var(--purple)","var(--green)","var(--orange)","var(--red)"];
  if(ranked.length<2)return e("div",{className:"onboard-empty"},e("div",{className:"big"},"📐"),"Add at least 2 cities first");

  // For each metric with weight > 0, compute what happens if we max it (weight=10) vs zero it
  const activeMetrics=METRIC_DEFS.filter(m=>(weights[m.key]||0)>0);

  const scenarioRanking=(overrideWeights)=>{
    const w={...weights,...overrideWeights};
    return ranked
      .map(r=>({name:r.name,total:scoreCityTotal(allScoresMap[r.name]?.scores||{},w)}))
      .sort((a,b)=>b.total-a.total);
  };

  const baseWinner=ranked[0]?.name;

  const scenarios=activeMetrics.map(m=>{
    const maxRanking=scenarioRanking({[m.key]:10});
    const zeroRanking=scenarioRanking({[m.key]:0});
    const maxWinner=maxRanking[0]?.name;
    const zeroWinner=zeroRanking[0]?.name;
    const changesMax=maxWinner!==baseWinner;
    const changesZero=zeroWinner!==baseWinner;
    return{metric:m,maxRanking,zeroRanking,maxWinner,zeroWinner,changesMax,changesZero};
  }).filter(s=>s.changesMax||s.changesZero);

  const noChange=activeMetrics.filter(m=>{
    const maxW=scenarioRanking({[m.key]:10})[0]?.name;
    const zeroW=scenarioRanking({[m.key]:0})[0]?.name;
    return maxW===baseWinner&&zeroW===baseWinner;
  });

  return e("div",null,
    // Intro
    e("div",{style:{background:"var(--surf)",border:"1px solid var(--border)",borderRadius:"var(--r2)",padding:14,marginBottom:16}},
      e("div",{style:{fontFamily:"DM Mono,monospace",fontSize:".72rem",color:"var(--dim)",lineHeight:1.65}},
        "Sensitivity analysis asks: ",e("em",{style:{color:"var(--accent)"}},"\"what would flip the #1 result?\""),
        " For each metric, we test what happens to the ranking if you max it (weight=10) or remove it (weight=0). Scenarios that don't change the winner are stable; ones that do are shown below."
      )
    ),
    // Current winner
    e("div",{style:{background:"rgba(232,255,71,.07)",border:"1px solid rgba(232,255,71,.25)",borderRadius:"var(--r)",padding:"10px 14px",marginBottom:14,fontFamily:"DM Mono,monospace",fontSize:".72rem"}},
      "Current #1: ",e("strong",{style:{color:"var(--accent)"}},CITY_DB.find(c=>c.city===baseWinner)?.flag||"🏙️"," ",baseWinner),
      " — shown below are metrics that would change this outcome if you weighted them differently."
    ),

    scenarios.length===0&&e("div",{style:{fontFamily:"DM Mono,monospace",fontSize:".75rem",color:"var(--green)",padding:"14px 0",textAlign:"center"}},
      "✓ The current #1 ranking is robust — no single metric change flips it."
    ),

    scenarios.map(s=>e("div",{
      key:s.metric.key,
      style:{background:"var(--surf)",border:"1px solid "+(hoverKey===s.metric.key?"var(--border)":"var(--border)"),borderRadius:"var(--r)",padding:"12px 14px",marginBottom:8,transition:"border-color .15s"},
      onMouseEnter:()=>setHoverKey(s.metric.key),
      onMouseLeave:()=>setHoverKey(null),
    },
      e("div",{style:{display:"flex",alignItems:"center",gap:8,marginBottom:8}},
        e("div",{style:{flex:1,fontWeight:600,fontSize:".82rem"}},s.metric.label),
        e("span",{style:{fontFamily:"DM Mono,monospace",fontSize:".6rem",color:"var(--orange)",background:"rgba(255,179,71,.1)",border:"1px solid rgba(255,179,71,.25)",borderRadius:20,padding:"2px 8px"}},"current weight: "+weights[s.metric.key])
      ),
      e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}},
        // Max scenario
        e("div",{style:{background:"var(--surf2)",borderRadius:4,padding:"8px 10px"}},
          e("div",{style:{fontFamily:"DM Mono,monospace",fontSize:".57rem",color:"var(--muted)",textTransform:"uppercase",letterSpacing:".07em",marginBottom:5}},"If weight = 10 (max)"),
          s.maxRanking.slice(0,3).map((r,i)=>e("div",{key:r.name,style:{display:"flex",alignItems:"center",gap:6,marginBottom:3}},
            e("span",{style:{fontFamily:"DM Mono,monospace",fontSize:".6rem",color:i===0?CITY_COLORS[ranked.findIndex(x=>x.name===r.name)]:"var(--muted)",width:16}},"#"+(i+1)),
            e("span",{style:{fontSize:12}},CITY_DB.find(c=>c.city===r.name)?.flag||""),
            e("span",{style:{fontSize:".75rem",fontWeight:i===0?700:400,color:i===0&&s.changesMax?"var(--accent)":"var(--text)"}},r.name),
            i===0&&s.changesMax&&e("span",{style:{fontFamily:"DM Mono,monospace",fontSize:".55rem",color:"var(--accent)",marginLeft:4}},"← NEW #1")
          ))
        ),
        // Zero scenario
        e("div",{style:{background:"var(--surf2)",borderRadius:4,padding:"8px 10px"}},
          e("div",{style:{fontFamily:"DM Mono,monospace",fontSize:".57rem",color:"var(--muted)",textTransform:"uppercase",letterSpacing:".07em",marginBottom:5}},"If weight = 0 (ignored)"),
          s.zeroRanking.slice(0,3).map((r,i)=>e("div",{key:r.name,style:{display:"flex",alignItems:"center",gap:6,marginBottom:3}},
            e("span",{style:{fontFamily:"DM Mono,monospace",fontSize:".6rem",color:i===0?CITY_COLORS[ranked.findIndex(x=>x.name===r.name)]:"var(--muted)",width:16}},"#"+(i+1)),
            e("span",{style:{fontSize:12}},CITY_DB.find(c=>c.city===r.name)?.flag||""),
            e("span",{style:{fontSize:".75rem",fontWeight:i===0?700:400,color:i===0&&s.changesZero?"var(--accent)":"var(--text)"}},r.name),
            i===0&&s.changesZero&&e("span",{style:{fontFamily:"DM Mono,monospace",fontSize:".55rem",color:"var(--accent)",marginLeft:4}},"← NEW #1")
          ))
        )
      )
    )),

    noChange.length>0&&e("div",{style:{marginTop:14}},
      e("div",{style:{fontFamily:"DM Mono,monospace",fontSize:".6rem",color:"var(--muted)",letterSpacing:".07em",textTransform:"uppercase",marginBottom:8}},"Stable metrics (no impact on #1)"),
      e("div",{style:{display:"flex",flexWrap:"wrap",gap:5}},
        noChange.map(m=>e("span",{key:m.key,style:{fontFamily:"DM Mono,monospace",fontSize:".63rem",padding:"2px 8px",borderRadius:20,background:"rgba(77,255,145,.07)",border:"1px solid rgba(77,255,145,.15)",color:"var(--green)"}},m.label))
      )
    )
  );
}

// ── Step 3: Output wrapper ───────────────────────────────────
function OutputStep({ranked,allScoresMap,weights,setup}){
  const[tab,setTab]=useState("summary");
  return e("div",{className:"output-layout"},
    // Left: city cards
    e("div",{className:"output-left"},
      e("div",{style:{marginBottom:14}},
        e("div",{className:"label"},"Rankings · click to expand"),
      ),
      ranked.length===0
        ?e("div",{className:"onboard-empty"},e("div",{className:"big"},"🏙️"),"Add cities in Step 1 to see results")
        :e("div",null,
          ranked.map((r,i)=>e(CityCard,{
            key:r.name,name:r.name,rank:i+1,total:r.total,
            maxTotal:ranked[0]?.total||100,
            allScores:allScoresMap[r.name]||{scores:{},raws:{},isLive:{}},
            weights,liveData:{}
          })),
          e("div",{className:"legend-row"},
            [["var(--blue)","Live API"],["var(--purple)","Calculated"],["var(--orange)","Sourced"],
             ["var(--green)","≥ 7.5"],["var(--red)","< 3.5"]].map(([c,l])=>
              e("div",{key:l,className:"legend-item"},e("div",{className:"ldot",style:{background:c}}),l)
            )
          )
        )
    ),
    // Right: tabs — summary is default, no click needed
    e("div",{className:"output-right"},
      e("div",{className:"output-tabs"},
        [["summary","📊 Summary"],["explain","💡 Explanations"],["sensitivity","📐 Sensitivity"],["metrics","🔬 Metrics"]].map(([id,lbl])=>
          e("div",{key:id,className:"ot"+(tab===id?" active":""),onClick:()=>setTab(id)},lbl)
        )
      ),
      tab==="summary"&&(ranked.length
        ?e(SummaryPanel,{ranked,allScoresMap,weights})
        :e("div",{className:"onboard-empty"},e("div",{className:"big"},"📊"),"Add cities first")),
      tab==="explain"&&e(ExplanationsPanel,{ranked,allScoresMap,weights,setup}),
      tab==="sensitivity"&&e(SensitivityPanel,{ranked,allScoresMap,weights}),
      tab==="metrics"&&e(MetricsPanel,{ranked,allScoresMap})
    )
  );
}

// ═══════════════════════════════════════════════════════════════
//  ROOT APP
// ═══════════════════════════════════════════════════════════════
function App(){
  const saved=loadState()||{};

  const[step,setStep]=useState(saved.step||0);
  const[setup,setSetup]=useState(saved.setup||{
    cities:[],passports:[],
    allAnchors:[],familyAnchors:[],proximityAnchors:[],
    languages:[],tempMin:10,tempMax:25,
    currentCity:null,currentCityInput:"",
  });
  const[weights,setWeights]=useState(saved.weights||DEFAULT_WEIGHTS);
  const[liveData,setLiveData]=useState(saved.liveData||{});
  const[pills,setPills]=useState([]);
  const[fetching,setFetching]=useState(false);

  // Save on every change
  useEffect(()=>{saveState({step,setup,weights,liveData});},[step,setup,weights,liveData]);

  const config=useMemo(()=>({
    passports:setup.passports,
    languages:setup.languages,
    familyAnchors:setup.familyAnchors,
    proximityAnchors:setup.proximityAnchors,
  }),[setup]);

  const allScoresMap=useMemo(()=>{
    const m={};
    for(const c of setup.cities){
      m[c.city]=buildScores(c.city,c,config,liveData);
    }
    return m;
  },[setup.cities,config,liveData,weights]);

  const ranked=useMemo(()=>{
    return setup.cities
      .map(c=>{const d=allScoresMap[c.city];return{name:c.city,total:d?scoreCityTotal(d.scores,weights):0};})
      .sort((a,b)=>b.total-a.total);
  },[allScoresMap,weights]);

  const setPill=useCallback((id,label,state)=>{
    setPills(prev=>[...prev.filter(p=>p.id!==id),{id,label,state}]);
  },[]);

  const handleFetch=useCallback(async()=>{
    if(fetching)return;
    setFetching(true);
    for(const city of setup.cities){
      const db=CITY_DB.find(c=>c.city===city.city)||city;
      setPill("w_"+city.city,db.flag+" "+city.city+" weather…","busy");
      try{
        const w=await fetchWeather(db,setup.tempMin,setup.tempMax);
        setLiveData(d=>({...d,[city.city]:{...(d[city.city]||{}),...w}}));
        setPill("w_"+city.city,db.flag+" weather ✓","ok");
      }catch(e){setPill("w_"+city.city,db.flag+" weather ✗ ("+e.message.slice(0,20)+")","err");}
      setPill("a_"+city.city,db.flag+" "+city.city+" air…","busy");
      try{
        const a=await fetchAir(db);
        setLiveData(d=>({...d,[city.city]:{...(d[city.city]||{}),...a}}));
        setPill("a_"+city.city,db.flag+" air ✓","ok");
      }catch(e){setPill("a_"+city.city,db.flag+" air ✗","err");}
      setPill("n_"+city.city,db.flag+" Numbeo…","busy");
      try{
        const n=await fetchNumbeo(db);
        setLiveData(d=>({...d,[city.city]:{...(d[city.city]||{}),...n}}));
        setPill("n_"+city.city,db.flag+" Numbeo ✓","ok");
      }catch(e){setPill("n_"+city.city,db.flag+" Numbeo ✗","err");}
      await new Promise(r=>setTimeout(r,300));
    }
    setFetching(false);
  },[setup.cities,setup.tempMin,setup.tempMax,fetching,setPill]);

  const canAdvance=[
    setup.cities.length>=2,
    true,
    true
  ];
  // Block step 1→2 if anchors are set but don't sum to 100
  const anchorTotal=(setup.allAnchors||[]).reduce((s,a)=>s+a.weight,0);
  if(setup.allAnchors?.length>0&&anchorTotal!==100)canAdvance[0]=false;

  const STEPS=[
    {label:"1. Setup",icon:"⚙️"},
    {label:"2. Priorities",icon:"⚖️"},
    {label:"3. Results",icon:"📊"},
  ];

  return e("div",{className:"page"},
    e("div",{className:"app-header"},
      e("div",{style:{display:"flex",alignItems:"flex-start",justifyContent:"space-between",flexWrap:"wrap",gap:10,marginBottom:16}},
        e("div",null,
          e("h1",null,"Where should you ",e("span",{style:{color:"var(--accent)"}},"move?")),
          e("div",{style:{fontFamily:"DM Mono,monospace",fontSize:".65rem",color:"var(--muted)",marginTop:4}},
            "Data-driven relocation scoring · "+setup.cities.length+" cities · 17 metrics")
        ),
        e("div",{style:{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap",marginTop:4}},
          setup.currentCity&&e("span",{className:"tag"},"📍 ",setup.currentCity.flag," ",setup.currentCity.city),
          setup.passports.map(p=>e("span",{key:p,className:"tag tag-y"},"🛂 ",p)),
          setup.languages.slice(0,2).map(l=>e("span",{key:l,className:"tag"},"💬 ",l)),
          setup.languages.length>2&&e("span",{className:"tag"},"+",setup.languages.length-2," more"),
          (setup.allAnchors||[]).length>0&&e("span",{className:"tag tag-b"},"👥 ",(setup.allAnchors||[]).length," anchor"+(((setup.allAnchors||[]).length>1)?"s":"")),
          e("button",{className:"btn btn-ghost btn-sm",onClick:()=>{if(window.confirm("Reset everything? This clears all your data.")){localStorage.removeItem(LS_KEY);location.reload();}}},"Reset")
        )
      ),
      e("div",{className:"step-bar"},
        STEPS.map((s,i)=>e("div",{
          key:i,
          className:"step-item"+(step===i?" active":i<step?" done":""),
          onClick:()=>{if(i<=step||(canAdvance[step]&&i===step+1))setStep(i);}
        },
          e("div",{className:"step-num"},i<step?"✓":i+1),
          s.label
        )),
        e("div",{style:{flex:1}}),
        step<2&&e("button",{
          className:"btn btn-primary btn-sm",
          disabled:!canAdvance[step],
          onClick:()=>setStep(s=>s+1)
        },step===1?"See Results →":"Next →"),
        step>0&&e("button",{className:"btn btn-ghost btn-sm",style:{marginLeft:6},onClick:()=>setStep(s=>s-1)},"← Back")
      )
    ),
    step===0&&e(SetupStep,{setup,onChange:setSetup,onFetch:handleFetch,fetching,pills}),
    step===1&&e(PrioritiesStep,{weights,onChange:setWeights,ranked}),
    step===2&&e(OutputStep,{ranked,allScoresMap,weights,setup})
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
